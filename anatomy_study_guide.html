<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anatomy & Physiology · Self-Evaluation Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e1a;
  --surface: #141828;
  --card: #1c2235;
  --border: #2a3050;
  --gold: #f5c842;
  --teal: #38d9c0;
  --red: #ff6b6b;
  --green: #4ddd80;
  --blue: #5b9cf6;
  --text: #e8ecf8;
  --muted: #7a82a0;
  --tag: #1e2640;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* === HERO === */
.hero {
  background: linear-gradient(135deg, #0b0e1a 0%, #141828 40%, #0e1525 100%);
  border-bottom: 1px solid var(--border);
  padding: 40px 20px 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(245,200,66,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 900;
  color: var(--gold);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.hero p {
  color: var(--muted);
  font-size: 0.9rem;
  margin-bottom: 20px;
}

/* === SCOREBOARD === */
.scoreboard {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.score-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 12px 20px;
  text-align: center;
  min-width: 100px;
  transition: transform 0.2s;
}
.score-box:hover { transform: translateY(-2px); }
.score-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  line-height: 1;
}
.score-val.gold { color: var(--gold); }
.score-val.green { color: var(--green); }
.score-val.red { color: var(--red); }
.score-val.blue { color: var(--blue); }
.score-label { font-size: 0.7rem; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

.grade-badge {
  display: inline-block;
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  padding: 8px 24px;
  border-radius: 50px;
  border: 2px solid;
  margin: 8px 0;
  transition: all 0.4s;
}

/* === CONTROLS === */
.controls {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  padding: 0 20px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding-top: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.tab {
  padding: 8px 18px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.83rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active { background: var(--gold); border-color: var(--gold); color: #0b0e1a; }
.tab:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

.search-wrap { position: relative; width: 100%; max-width: 340px; }
.search {
  width: 100%;
  padding: 8px 14px 8px 36px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 0.85rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border 0.2s;
}
.search:focus { border-color: var(--gold); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }

.btn-reset {
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--red);
  background: transparent;
  color: var(--red);
  cursor: pointer;
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-reset:hover { background: var(--red); color: white; }

/* === MAIN CONTENT === */
.main { padding: 20px; max-width: 1200px; margin: 0 auto; }

.section-header {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--teal);
  border-left: 4px solid var(--teal);
  padding-left: 10px;
  margin: 24px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-count { font-size: 0.72rem; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

/* === FILL IN BLANK CARDS === */
.fill-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: all 0.25s;
  cursor: pointer;
}
.fill-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: var(--shadow); }
.fill-card.correct { border-color: var(--green); background: #1c2d24; }
.fill-card.incorrect { border-color: var(--red); background: #2d1c1c; }
.fill-card.skipped { border-color: var(--blue); background: #1c2235; opacity: 0.7; }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.q-text { font-weight: 500; font-size: 0.9rem; color: var(--text); flex: 1; line-height: 1.5; }
.freq { background: var(--tag); color: var(--gold); font-size: 0.68rem; font-weight: 700; padding: 3px 8px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; border: 1px solid #f5c84220; }

.answer-area { margin-top: 8px; }
.ans-input {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 0.88rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border 0.2s;
}
.ans-input:focus { border-color: var(--gold); }
.ans-input:disabled { opacity: 0.6; }

.btn-check {
  margin-top: 8px;
  padding: 7px 16px;
  border-radius: 8px;
  border: none;
  background: var(--gold);
  color: #0b0e1a;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.btn-check:hover { background: #e6b830; }
.btn-check:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-skip {
  margin-top: 8px;
  margin-left: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.btn-skip:hover { border-color: var(--blue); color: var(--blue); }

.result-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.result-ans { font-size: 0.88rem; font-weight: 600; }
.result-ans.ok { color: var(--green); }
.result-ans.bad { color: var(--red); }
.correct-ans { font-size: 0.82rem; color: var(--teal); margin-top: 4px; }
.mnemonic { font-size: 0.78rem; color: var(--muted); font-style: italic; background: #1e2640; border-radius: 6px; padding: 6px 10px; border-left: 3px solid var(--gold); margin-top: 6px; line-height: 1.5; }

/* === T/F CARDS === */
.tf-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  transition: all 0.25s;
}
.tf-card:hover { border-color: var(--gold); box-shadow: var(--shadow); }
.tf-card.correct { border-color: var(--green); background: #1c2d24; }
.tf-card.incorrect { border-color: var(--red); background: #2d1c1c; }

.tf-q { font-size: 0.9rem; font-weight: 500; margin-bottom: 10px; line-height: 1.5; }
.tf-buttons { display: flex; gap: 8px; margin-bottom: 6px; }
.tf-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.tf-btn.true-btn:hover { border-color: var(--green); color: var(--green); }
.tf-btn.false-btn:hover { border-color: var(--red); color: var(--red); }
.tf-btn.selected-true { background: #1a3d2b; border-color: var(--green); color: var(--green); }
.tf-btn.selected-false { background: #3d1a1a; border-color: var(--red); color: var(--red); }
.tf-btn:disabled { cursor: not-allowed; opacity: 0.6; }

.tf-result { font-size: 0.82rem; margin-top: 6px; }
.tf-tip { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 5px; background: #1e2640; border-radius: 6px; padding: 5px 9px; border-left: 3px solid var(--teal); }
.tf-freq { font-size: 0.68rem; color: var(--gold); font-weight: 700; margin-top: 5px; }

/* === MEANINGS CARDS === */
.def-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  transition: all 0.25s;
  cursor: pointer;
}
.def-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: var(--shadow); }
.def-term { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--gold); margin-bottom: 6px; }
.def-text { font-size: 0.85rem; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
.def-mem { font-size: 0.78rem; color: var(--muted); font-style: italic; background: #1e2640; border-radius: 6px; padding: 6px 10px; border-left: 3px solid var(--teal); line-height: 1.5; }
.def-freq { font-size: 0.68rem; color: var(--gold); font-weight: 700; margin-top: 6px; }

/* === RESULTS PANEL === */
.results-panel {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin: 20px auto;
  max-width: 600px;
  text-align: center;
}
.results-panel h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); margin-bottom: 16px; }
.grade-row { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin: 16px 0; }
.progress-bar-wrap { background: var(--bg); border-radius: 8px; height: 12px; overflow: hidden; margin: 12px 0; }
.progress-bar { height: 100%; border-radius: 8px; transition: width 1s ease; background: linear-gradient(90deg, var(--gold), var(--teal)); }

.count-line { text-align: center; color: var(--muted); font-size: 0.8rem; margin-bottom: 10px; }
.no-results { text-align: center; color: var(--muted); padding: 50px; font-size: 1rem; }

/* === RESPONSIVE === */
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
  .controls { gap: 6px; }
  .hero h1 { font-size: 1.5rem; }
}

/* === ANIMATIONS === */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fill-card, .tf-card, .def-card { animation: fadeIn 0.3s ease both; }

@keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
.pop { animation: pop 0.3s ease; }
</style>
</head>
<body>

<div class="hero">
  <h1>🏥 Anatomy & Physiology</h1>
  <p>Bioscience · Repeated Exam Questions · Self-Evaluation Study Guide</p>

  <div class="scoreboard" id="scoreboard">
    <div class="score-box">
      <div class="score-val gold" id="sc-total">0</div>
      <div class="score-label">Attempted</div>
    </div>
    <div class="score-box">
      <div class="score-val green" id="sc-correct">0</div>
      <div class="score-label">Correct</div>
    </div>
    <div class="score-box">
      <div class="score-val red" id="sc-wrong">0</div>
      <div class="score-label">Wrong</div>
    </div>
    <div class="score-box">
      <div class="score-val blue" id="sc-pct">—</div>
      <div class="score-label">Score %</div>
    </div>
    <div class="score-box">
      <div class="grade-badge" id="sc-grade" style="font-size:1.2rem;padding:6px 16px;">—</div>
      <div class="score-label">Grade</div>
    </div>
  </div>

  <div style="max-width:400px;margin:0 auto;">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="tab active" onclick="switchTab('fill')">📝 Fill in Blank</button>
  <button class="tab" onclick="switchTab('tf')">✅ True / False</button>
  <button class="tab" onclick="switchTab('meanings')">📖 Meanings</button>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" type="text" id="searchBox" placeholder="Search topics, answers..." oninput="renderAll()">
  </div>
  <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
</div>

<div class="main">
  <p class="count-line" id="countLine"></p>
  <div id="content"></div>
</div>

// ===================== STATE =====================
let currentTab = 'fill';
const fillState = {}; // id -> { status: 'correct'|'incorrect'|'skipped', userAns }
const tfState = {};   // id -> { status, chosen }

function getScore() {
  let correct = 0, wrong = 0, total = 0;
  Object.values(fillState).forEach(s => { total++; if (s.status === 'correct') correct++; else if (s.status === 'incorrect') wrong++; });
  Object.values(tfState).forEach(s => { total++; if (s.status === 'correct') correct++; else if (s.status === 'incorrect') wrong++; });
  return { correct, wrong, total };
}

function getGrade(pct) {
  if (pct >= 90) return { g: 'A+', c: '#4ddd80' };
  if (pct >= 80) return { g: 'A', c: '#4ddd80' };
  if (pct >= 70) return { g: 'B', c: '#f5c842' };
  if (pct >= 60) return { g: 'C', c: '#f5a623' };
  if (pct >= 50) return { g: 'D', c: '#ff9f43' };
  return { g: 'F', c: '#ff6b6b' };
}

function updateScore() {
  const { correct, wrong, total } = getScore();
  document.getElementById('sc-total').textContent = total;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  const pct = total > 0 ? Math.round((correct / total) * 100) : null;
  document.getElementById('sc-pct').textContent = pct !== null ? pct + '%' : '—';
  document.getElementById('progress-bar').style.width = (pct || 0) + '%';
  const gb = document.getElementById('sc-grade');
  if (pct !== null) {
    const { g, c } = getGrade(pct);
    gb.textContent = g;
    gb.style.color = c;
    gb.style.borderColor = c;
  } else {
    gb.textContent = '—';
    gb.style.color = '#7a82a0';
    gb.style.borderColor = '#7a82a0';
  }
}

function resetAll() {
  if (!confirm('Reset all answers and scores?')) return;
  Object.keys(fillState).forEach(k => delete fillState[k]);
  Object.keys(tfState).forEach(k => delete tfState[k]);
  updateScore();
  renderAll();
}

function checkFill(id, correctAns, alts) {
  const input = document.getElementById('input-' + id);
  const userAns = input.value.trim();
  if (!userAns) return;
  const normalUser = userAns.toLowerCase().replace(/[^a-z0-9]/g, '');
  const normalCorrect = correctAns.toLowerCase().replace(/[^a-z0-9]/g, '');
  const allAlts = [normalCorrect, ...alts.map(a => a.toLowerCase().replace(/[^a-z0-9]/g, ''))];
  const isCorrect = allAlts.some(a => normalUser.includes(a) || a.includes(normalUser));
  fillState[id] = { status: isCorrect ? 'correct' : 'incorrect', userAns };
  updateScore();
  refreshFillCard(id, correctAns);
}

function skipFill(id) {
  fillState[id] = { status: 'skipped' };
  updateScore();
  refreshFillCard(id);
}

function refreshFillCard(id, correctAns) {
  const card = document.getElementById('fcard-' + id);
  if (!card) return;
  const s = fillState[id];
  card.classList.remove('correct', 'incorrect', 'skipped');
  if (s) card.classList.add(s.status);

  const aa = card.querySelector('.answer-area');
  const item = fillData[parseInt(id)];
  if (!item) return;
  if (s && s.status !== undefined) {
    let html = '';
    if (s.status === 'correct') {
      html = `<div class="result-row"><span class="result-ans ok">✅ Correct! "${s.userAns}"</span></div>`;
    } else if (s.status === 'incorrect') {
      html = `<div class="result-row"><span class="result-ans bad">❌ Wrong: "${s.userAns}"</span></div><div class="correct-ans">✅ Answer: ${item.ans}</div>`;
    } else {
      html = `<div class="correct-ans">⏭ Skipped — Answer: ${item.ans}</div>`;
    }
    html += `<div class="mnemonic">💡 ${item.mem}</div>`;
    aa.innerHTML = html;
  }
}

function checkTF(id, chosen) {
  const item = tfData[parseInt(id)];
  if (!item) return;
  const isCorrect = (chosen === item.ans);
  tfState[id] = { status: isCorrect ? 'correct' : 'incorrect', chosen };
  updateScore();
  refreshTFCard(id);
}

function refreshTFCard(id) {
  const card = document.getElementById('tfcard-' + id);
  if (!card) return;
  const s = tfState[id];
  const item = tfData[parseInt(id)];
  card.classList.remove('correct', 'incorrect');
  if (s) {
    card.classList.add(s.status);
    const trueBtn = card.querySelector('.true-btn');
    const falseBtn = card.querySelector('.false-btn');
    if (trueBtn) { trueBtn.disabled = true; trueBtn.classList.toggle('selected-true', s.chosen === true); }
    if (falseBtn) { falseBtn.disabled = true; falseBtn.classList.toggle('selected-false', s.chosen === false); }
    const resultDiv = card.querySelector('.tf-result');
    if (resultDiv) {
      if (s.status === 'correct') resultDiv.innerHTML = `<span style="color:var(--green)">✅ Correct!</span>`;
      else resultDiv.innerHTML = `<span style="color:var(--red)">❌ Wrong — Answer: <strong style="color:var(--teal)">${item.ans ? 'TRUE' : 'FALSE'}</strong></span>`;
      const tipDiv = card.querySelector('.tf-tip');
      if (tipDiv) tipDiv.style.display = 'block';
    }
  }
}

// ===================== RENDER =====================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['fill','tf','meanings'][i] === tab);
  });
  renderAll();
}

function getQ() { return document.getElementById('searchBox').value.toLowerCase().trim(); }

function renderAll() {
  const q = getQ();
  const container = document.getElementById('content');
  container.innerHTML = '';
  if (currentTab === 'fill') renderFill(q, container);
  else if (currentTab === 'tf') renderTF(q, container);
  else renderMeanings(q, container);
}

function renderFill(q, container) {
  const sections = {};
  let total = 0;
  fillData.forEach((item, i) => {
    if (q && !item.q.toLowerCase().includes(q) && !item.ans.toLowerCase().includes(q) && !item.section.toLowerCase().includes(q) && !item.mem.toLowerCase().includes(q)) return;
    if (!sections[item.section]) sections[item.section] = [];
    sections[item.section].push({ item, i });
    total++;
  });
  document.getElementById('countLine').textContent = `Showing ${total} questions`;
  if (!total) { container.innerHTML = '<p class="no-results">No results found.</p>'; return; }

  Object.entries(sections).forEach(([sec, entries]) => {
    container.insertAdjacentHTML('beforeend', `<div class="section-header">${sec} <span class="section-count">${entries.length} questions</span></div>`);
    const grid = document.createElement('div');
    grid.className = 'grid';
    entries.forEach(({ item, i }) => {
      const s = fillState[i];
      const stateClass = s ? s.status : '';
      let innerHtml = `
        <div class="card-top">
          <div class="q-text">${item.q}</div>
          <div class="freq">🔁 ${item.freq}</div>
        </div>
        <div class="answer-area">`;
      if (s) {
        if (s.status === 'correct') innerHtml += `<div class="result-row"><span class="result-ans ok">✅ Correct! "${s.userAns}"</span></div>`;
        else if (s.status === 'incorrect') innerHtml += `<div class="result-row"><span class="result-ans bad">❌ Wrong: "${s.userAns}"</span></div><div class="correct-ans">✅ Answer: ${item.ans}</div>`;
        else innerHtml += `<div class="correct-ans">⏭ Skipped — Answer: ${item.ans}</div>`;
        innerHtml += `<div class="mnemonic">💡 ${item.mem}</div>`;
      } else {
        innerHtml += `
          <input class="ans-input" id="input-${i}" type="text" placeholder="Type your answer..." onkeydown="if(event.key==='Enter') checkFill(${i}, '${item.ans.replace(/'/g,"\\'")}', ${JSON.stringify(item.alts)})">
          <button class="btn-check" onclick="checkFill(${i}, '${item.ans.replace(/'/g,"\\'")}', ${JSON.stringify(item.alts)})">Check ✓</button>
          <button class="btn-skip" onclick="skipFill(${i})">Skip</button>`;
      }
      innerHtml += `</div>`;
      const card = document.createElement('div');
      card.className = `fill-card ${stateClass}`;
      card.id = 'fcard-' + i;
      card.innerHTML = innerHtml;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

function renderTF(q, container) {
  const sections = {};
  let total = 0;
  tfData.forEach((item, i) => {
    if (q && !item.q.toLowerCase().includes(q) && !item.section.toLowerCase().includes(q) && !item.tip.toLowerCase().includes(q)) return;
    if (!sections[item.section]) sections[item.section] = [];
    sections[item.section].push({ item, i });
    total++;
  });
  document.getElementById('countLine').textContent = `Showing ${total} statements`;
  if (!total) { container.innerHTML = '<p class="no-results">No results found.</p>'; return; }

  Object.entries(sections).forEach(([sec, entries]) => {
    container.insertAdjacentHTML('beforeend', `<div class="section-header">${sec} <span class="section-count">${entries.length} statements</span></div>`);
    const grid = document.createElement('div');
    grid.className = 'grid';
    entries.forEach(({ item, i }) => {
      const s = tfState[i];
      const stateClass = s ? s.status : '';
      const tipDisplay = s ? 'block' : 'none';
      let resultHtml = '';
      if (s) {
        if (s.status === 'correct') resultHtml = `<span style="color:var(--green)">✅ Correct!</span>`;
        else resultHtml = `<span style="color:var(--red)">❌ Wrong — Answer: <strong style="color:var(--teal)">${item.ans ? 'TRUE' : 'FALSE'}</strong></span>`;
      }
      const card = document.createElement('div');
      card.className = `tf-card ${stateClass}`;
      card.id = 'tfcard-' + i;
      card.innerHTML = `
        <div class="tf-q">${item.q}</div>
        <div class="tf-buttons">
          <button class="tf-btn true-btn ${s && s.chosen===true ? 'selected-true' : ''}" onclick="checkTF(${i}, true)" ${s ? 'disabled' : ''}>✓ TRUE</button>
          <button class="tf-btn false-btn ${s && s.chosen===false ? 'selected-false' : ''}" onclick="checkTF(${i}, false)" ${s ? 'disabled' : ''}>✗ FALSE</button>
        </div>
        <div class="tf-result">${resultHtml}</div>
        <div class="tf-tip" style="display:${tipDisplay}">💡 ${item.tip}</div>
        <div class="tf-freq">🔁 ${item.freq}</div>`;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

function renderMeanings(q, container) {
  const sections = {};
  let total = 0;
  meaningsData.forEach((item, i) => {
    if (q && !item.term.toLowerCase().includes(q) && !item.def.toLowerCase().includes(q) && !item.section.toLowerCase().includes(q) && !item.mem.toLowerCase().includes(q)) return;
    if (!sections[item.section]) sections[item.section] = [];
    sections[item.section].push({ item, i });
    total++;
  });
  document.getElementById('countLine').textContent = `Showing ${total} definitions`;
  if (!total) { container.innerHTML = '<p class="no-results">No results found.</p>'; return; }

  Object.entries(sections).forEach(([sec, entries]) => {
    container.insertAdjacentHTML('beforeend', `<div class="section-header">${sec} <span class="section-count">${entries.length} terms</span></div>`);
    const grid = document.createElement('div');
    grid.className = 'grid';
    entries.forEach(({ item }) => {
      const card = document.createElement('div');
      card.className = 'def-card';
      card.innerHTML = `
        <div class="def-term">${item.term}</div>
        <div class="def-text">${item.def}</div>
        <div class="def-mem">💡 ${item.mem}</div>
        <div class="def-freq">🔁 ${item.freq}</div>`;
      grid.appendChild(card);
    });
    container.appendChild(grid);
  });
}

// Init
updateScore();
renderAll();
</script>
</body>
</html>
