<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundamentals of Nursing · Self-Evaluation Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e1a;--surface:#141828;--card:#1c2235;--border:#2a3050;--gold:#f5c842;--teal:#38d9c0;--red:#ff6b6b;--green:#4ddd80;--blue:#5b9cf6;--accent:#ff9f43;--text:#e8ecf8;--muted:#7a82a0;--tag:#1e2640;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
.hero{background:linear-gradient(135deg,#0b0e1a 0%,#1a140e 40%,#0e0b0a 100%);border-bottom:1px solid var(--border);padding:40px 20px 30px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse,rgba(255,159,67,0.07) 0%,transparent 70%);pointer-events:none;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;color:var(--accent);letter-spacing:-0.5px;margin-bottom:6px;}
.hero p{color:var(--muted);font-size:.9rem;margin-bottom:20px;}
.scoreboard{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.score-box{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:12px 20px;text-align:center;min-width:100px;transition:transform .2s;}
.score-box:hover{transform:translateY(-2px);}
.score-val{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;line-height:1;}
.score-label{font-size:.7rem;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.grade-badge{display:inline-block;font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;padding:8px 24px;border-radius:50px;border:2px solid;margin:8px 0;transition:all .4s;}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:16px 20px 14px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0b0e1a;}
.tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}
.search-wrap{position:relative;width:100%;max-width:320px;}
.search{width:100%;padding:8px 14px 8px 36px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.search:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none;}
.btn-reset{padding:8px 16px;border-radius:20px;border:1.5px solid var(--red);background:transparent;color:var(--red);cursor:pointer;font-size:.8rem;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
.btn-reset:hover{background:var(--red);color:white;}
.main{padding:20px;max-width:1200px;margin:0 auto;}
.section-header{font-family:'Playfair Display',serif;font-size:1rem;color:var(--accent);border-left:4px solid var(--accent);padding-left:10px;margin:24px 0 12px;display:flex;align-items:center;gap:8px;}
.section-count{font-size:.72rem;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:400;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.fill-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px;transition:all .25s;}
.fill-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,.4);}
.fill-card.correct{border-color:var(--green);background:#1c2d24;}
.fill-card.incorrect{border-color:var(--red);background:#2d1c1c;}
.fill-card.skipped{border-color:var(--blue);opacity:.75;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px;}
.q-text{font-weight:500;font-size:.9rem;color:var(--text);flex:1;line-height:1.5;}
.freq{background:var(--tag);color:var(--accent);font-size:.68rem;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap;flex-shrink:0;border:1px solid rgba(255,159,67,.2);}
.ans-input{width:100%;padding:8px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:.88rem;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.ans-input:focus{border-color:var(--accent);}
.btn-check{margin-top:8px;padding:7px 16px;border-radius:8px;border:none;background:var(--accent);color:#0b0e1a;font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-check:hover{background:#e8902e;}
.btn-skip{margin-top:8px;margin-left:6px;padding:7px 14px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-skip:hover{border-color:var(--blue);color:var(--blue);}
.result-ans.ok{color:var(--green);font-size:.88rem;font-weight:600;}
.result-ans.bad{color:var(--red);font-size:.88rem;font-weight:600;}
.correct-ans{font-size:.82rem;color:var(--accent);margin-top:4px;}
.mnemonic{font-size:.78rem;color:var(--muted);font-style:italic;background:#1e2640;border-radius:6px;padding:6px 10px;border-left:3px solid var(--accent);margin-top:6px;line-height:1.5;}
.tf-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;transition:all .25s;}
.tf-card:hover{border-color:var(--accent);box-shadow:0 4px 24px rgba(0,0,0,.4);}
.tf-card.correct{border-color:var(--green);background:#1c2d24;}
.tf-card.incorrect{border-color:var(--red);background:#2d1c1c;}
.tf-q{font-size:.9rem;font-weight:500;margin-bottom:10px;line-height:1.5;}
.tf-buttons{display:flex;gap:8px;margin-bottom:6px;}
.tf-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.82rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.tf-btn.true-btn:hover{border-color:var(--green);color:var(--green);}
.tf-btn.false-btn:hover{border-color:var(--red);color:var(--red);}
.tf-btn.selected-true{background:#1a3d2b;border-color:var(--green);color:var(--green);}
.tf-btn.selected-false{background:#3d1a1a;border-color:var(--red);color:var(--red);}
.tf-btn:disabled{cursor:not-allowed;opacity:.6;}
.tf-result{font-size:.82rem;margin-top:6px;}
.tf-tip{font-size:.78rem;color:var(--muted);font-style:italic;margin-top:5px;background:#1e2640;border-radius:6px;padding:5px 9px;border-left:3px solid var(--accent);line-height:1.4;}
.tf-freq{font-size:.68rem;color:var(--accent);font-weight:700;margin-top:5px;}
.def-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px;transition:all .25s;}
.def-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 24px rgba(0,0,0,.4);}
.def-term{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--accent);margin-bottom:6px;}
.def-text{font-size:.85rem;color:var(--text);margin-bottom:8px;line-height:1.6;}
.def-mem{font-size:.78rem;color:var(--muted);font-style:italic;background:#1e2640;border-radius:6px;padding:6px 10px;border-left:3px solid var(--accent);line-height:1.5;}
.def-freq{font-size:.68rem;color:var(--accent);font-weight:700;margin-top:6px;}
.desc-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:16px;transition:all .25s;}
.desc-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.desc-q{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.5;}
.desc-years{font-size:.75rem;color:var(--muted);margin-bottom:4px;}
.desc-freq{font-size:.72rem;color:var(--accent);font-weight:700;background:var(--tag);padding:3px 8px;border-radius:8px;display:inline-block;margin-top:4px;border:1px solid rgba(255,159,67,.2);}
.progress-bar-wrap{background:var(--bg);border-radius:8px;height:12px;overflow:hidden;margin:12px auto;max-width:400px;}
.progress-bar{height:100%;border-radius:8px;transition:width 1s ease;background:linear-gradient(90deg,var(--accent),var(--gold));}
.count-line{text-align:center;color:var(--muted);font-size:.8rem;margin-bottom:10px;}
.no-results{text-align:center;color:var(--muted);padding:50px;font-size:1rem;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}.hero h1{font-size:1.5rem;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fill-card,.tf-card,.def-card,.desc-card{animation:fadeIn .3s ease both;}
</style>
</head>
<body>
<div class="hero">
  <h1>🩺 Fundamentals of Nursing</h1>
  <p>FON · Repeated Exam Questions · Self-Evaluation Study Guide</p>
  <div class="scoreboard">
    <div class="score-box"><div class="score-val" style="color:var(--accent)" id="sc-total">0</div><div class="score-label">Attempted</div></div>
    <div class="score-box"><div class="score-val" style="color:var(--green)" id="sc-correct">0</div><div class="score-label">Correct</div></div>
    <div class="score-box"><div class="score-val" style="color:var(--red)" id="sc-wrong">0</div><div class="score-label">Wrong</div></div>
    <div class="score-box"><div class="score-val" style="color:var(--blue)" id="sc-pct">—</div><div class="score-label">Score %</div></div>
    <div class="score-box"><div class="grade-badge" id="sc-grade" style="font-size:1.2rem;padding:6px 16px;color:#7a82a0;border-color:#7a82a0;">—</div><div class="score-label">Grade</div></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
</div>
<div class="controls">
  <button class="tab active" onclick="switchTab('fill')">📝 Fill in Blank</button>
  <button class="tab" onclick="switchTab('meanings')">📖 Meanings</button>
  <button class="tab" onclick="switchTab('desc')">📋 Descriptive Topics</button>
  <div class="search-wrap"><span class="search-icon">🔍</span><input class="search" type="text" id="searchBox" placeholder="Search topics, answers..." oninput="renderAll()"></div>
  <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
</div>
<div class="main"><p class="count-line" id="countLine"></p><div id="content"></div></div>
<script>
const fillData=[
  {section:"Respiratory & Vital Signs",q:"Lack of oxygen in the tissue is called _______.",ans:"Hypoxia",alts:[],mem:"HYPO = less, OXIA = oxygen. Hypoxia = tissues crying for oxygen!",freq:"5× (Nov 2022, Feb 2019, Feb 2016, Aug 2015, Feb 2012)"},
  {section:"Respiratory & Vital Signs",q:"Lack of oxygen in the blood is called _______.",ans:"Hypoxemia",alts:[],mem:"HYPO = less, OXEMIA = oxygen in blood. Hypoxemia = low O2 in blood!",freq:"2× (July 2025, Aug 2017)"},
  {section:"Respiratory & Vital Signs",q:"Difficulty in breathing is called _______.",ans:"Dyspnea",alts:["dyspnoea"],mem:"DYS = difficult, PNEA = breathing. Dyspnea = difficult breathing!",freq:"2× (Jan 2024, Sep 2013)"},
  {section:"Respiratory & Vital Signs",q:"Difficulty in swallowing is called _______.",ans:"Dysphagia",alts:[],mem:"DYS = difficult, PHAGIA = swallowing. Dysphagia = can't swallow easily!",freq:"3× (Nov 2022, Aug 2017, Aug 2012)"},
  {section:"Respiratory & Vital Signs",q:"Bleeding from the nose is _______.",ans:"Epistaxis",alts:[],mem:"EPI = upon, STAXIS = dripping. Epistaxis = blood dripping from nose!",freq:"3× (May 2023, Aug 2018, Aug 2016)"},
  {section:"Respiratory & Vital Signs",q:"Blood in the sputum is _______.",ans:"Hemoptysis",alts:["haemoptysis"],mem:"HEMO = blood, PTYSIS = spitting. Hemoptysis = spitting blood!",freq:"2× (July 2025, Apr 2021)"},
  {section:"Respiratory & Vital Signs",q:"Increase in respiratory rate is _______.",ans:"Tachypnea",alts:["tachypnoea"],mem:"TACHY = fast, PNEA = breathing. Tachypnea = fast breathing!",freq:"1× (Jan 2022)"},
  {section:"Respiratory & Vital Signs",q:"Respiratory rate >24/min is _______.",ans:"Tachypnea",alts:["tachypnoea"],mem:"TACHY = fast. More than 24 breaths/min = Tachypnea!",freq:"1× (Feb 2018)"},
  {section:"Respiratory & Vital Signs",q:"Total cessation of breathing is _______.",ans:"Apnea",alts:["apnoea"],mem:"A = without, PNEA = breathing. APNEA = NO breathing at all!",freq:"1× (Aug 2014)"},
  {section:"Respiratory & Vital Signs",q:"Bluish discoloration of skin & mucous membrane is _______.",ans:"Cyanosis",alts:[],mem:"CYANO = blue (Greek). Cyanosis = blue skin = oxygen emergency!",freq:"2× (Apr 2021, Aug 2017)"},
  {section:"Respiratory & Vital Signs",q:"Phonation is a function of _______.",ans:"Larynx",alts:[],mem:"PHONation = PHONe = voice. Larynx = voice box!",freq:"1× (Aug 2012)"},
  {section:"Respiratory & Vital Signs",q:"Pulse rate <60/min is _______.",ans:"Bradycardia",alts:[],mem:"BRADY = slow, CARDIA = heart. Bradycardia = slow heart!",freq:"2× (Feb 2025, Feb 2017)"},
  {section:"Respiratory & Vital Signs",q:"BP measured by _______.",ans:"Sphygmomanometer",alts:["sphygmo"],mem:"SPHYGMO = pulse, MANO = pressure, METER = measure. Big word for BP machine!",freq:"2× (July 2024, Aug 2018)"},
  {section:"Respiratory & Vital Signs",q:"High blood pressure is _______.",ans:"Hypertension",alts:[],mem:"HYPER = high, TENSION = pressure. Hypertension = HIGH blood pressure!",freq:"1× (Feb 2016)"},
  {section:"Respiratory & Vital Signs",q:"Low blood pressure is _______.",ans:"Hypotension",alts:[],mem:"HYPO = low, TENSION = pressure. Hypotension = LOW blood pressure!",freq:"1× (Aug 2014)"},
  {section:"Respiratory & Vital Signs",q:"Normal BP is _______.",ans:"120/80 mmHg",alts:["120/80"],mem:"120/80 = standard. '1-2-0 over 80 = healthy flow!'",freq:"1× (Feb 2017)"},
  {section:"Oral & GI Health",q:"Loss of appetite is _______.",ans:"Anorexia",alts:[],mem:"AN = without, OREXIA = appetite. Anorexia = no desire to eat!",freq:"4× (July 2024, Aug 2018, Feb 2018, Feb 2012)"},
  {section:"Oral & GI Health",q:"Inflammation of oral mucosa is _______.",ans:"Stomatitis",alts:[],mem:"STOMATO = mouth, ITIS = inflammation. Stomatitis = inflamed mouth!",freq:"3× (Nov 2022, Feb 2019, Feb 2016)"},
  {section:"Oral & GI Health",q:"Inflammation of gums is _______.",ans:"Gingivitis",alts:[],mem:"GINGIVA = gums, ITIS = inflammation. Gingivitis = gum disease!",freq:"1× (Jan 2024)"},
  {section:"Oral & GI Health",q:"Bleeding from gums is _______.",ans:"Gingival bleeding / Gingiorrhagia",alts:["gingival bleeding","gingiorrhagia"],mem:"GINGIVA = gums, RRHAGIA = bleeding. Gingival bleeding = gums bleed!",freq:"1× (Feb 2014)"},
  {section:"Oral & GI Health",q:"Inflammation of the tongue is _______.",ans:"Glossitis",alts:[],mem:"GLOSS = tongue (Greek), ITIS = inflammation. Glossitis = sore tongue!",freq:"1× (Feb 2017)"},
  {section:"Oral & GI Health",q:"Bad breath is _______.",ans:"Halitosis",alts:[],mem:"HALI = breath, TOSIS = condition. Halitosis = bad breath condition!",freq:"1× (Jan 2024)"},
  {section:"Oral & GI Health",q:"Cheilosis occurs due to deficiency of _______.",ans:"Vitamin B2 (Riboflavin)",alts:["vitamin b2","riboflavin","b2"],mem:"Cheilosis = cracked lips from B2 deficiency. B2 = Beautiful lips need it!",freq:"1× (Aug 2011)"},
  {section:"Oral & GI Health",q:"Cheilosis = _______.",ans:"Cracking/ulceration of lips & mouth angles",alts:["cracking","ulceration of lips"],mem:"Cheilosis = CHEILO (lips) damage. Cracked corners of mouth = Cheilosis!",freq:"1× (June 2013)"},
  {section:"Oral & GI Health",q:"Gas in GI tract is _______.",ans:"Flatulence",alts:[],mem:"FLATulence = FLATus = gas. Trapped gas in gut = Flatulence!",freq:"1× (Feb 2019)"},
  {section:"Oral & GI Health",q:"Lack of roughage leads to _______.",ans:"Constipation",alts:[],mem:"No roughage = no bulk = no movement = CONSTIPATION!",freq:"1× (Aug 2016)"},
  {section:"Urine & Excretion",q:"Blood in urine is _______.",ans:"Hematuria",alts:["haematuria"],mem:"HEMATO = blood, URIA = urine. Hematuria = blood in urine!",freq:"1× (Feb 2025)"},
  {section:"Urine & Excretion",q:"Glucose in urine is _______.",ans:"Glycosuria",alts:[],mem:"GLYCO = sugar, SURIA = urine. Glycosuria = sugar in urine = diabetes sign!",freq:"1× (Feb 2014)"},
  {section:"Urine & Excretion",q:"Test for urinary sugar is _______.",ans:"Benedict's Test",alts:["benedict"],mem:"BENEDICT's test = checks for sugar. Benedict = tests for sugars!",freq:"1× (Apr 2021)"},
  {section:"Urine & Excretion",q:"Specific gravity of urine = 1.010–1.030, measured by _______.",ans:"Urinometer",alts:[],mem:"URINometer = measures URINE specific gravity. Like a thermometer but for urine!",freq:"2× (May 2023, Aug 2012)"},
  {section:"Urine & Excretion",q:"Blue litmus turns red when urine is _______.",ans:"Acidic",alts:["acid"],mem:"BLUE litmus + ACID = RED. Acid turns blue to red!",freq:"1× (Feb 2011)"},
  {section:"Urine & Excretion",q:"Frequent night urination is _______.",ans:"Nocturia",alts:[],mem:"NOCTU = night, URIA = urine. Nocturia = night-time urination!",freq:"1× (Jan 2022)"},
  {section:"Urine & Excretion",q:"Removal of body waste is _______.",ans:"Excretion",alts:[],mem:"EXcretion = EXpelling waste. Body removes what it doesn't need!",freq:"1× (Feb 2014)"},
  {section:"Urine & Excretion",q:"Main organ for drug excretion is _______.",ans:"Kidney",alts:[],mem:"Kidney = filtration organ. Most drugs exit through kidneys in urine!",freq:"1× (Jan 2022)"},
  {section:"Examination & Assessment",q:"Visual examination is _______.",ans:"Inspection",alts:[],mem:"INspection = looking IN carefully. Use your eyes = Inspection!",freq:"2× (Jan 2024, Feb 2016)"},
  {section:"Examination & Assessment",q:"Examination by tapping is _______.",ans:"Percussion",alts:[],mem:"PERCussion = tapping like a drum. Tap the body = Percussion!",freq:"2× (July 2024, Feb 2018)"},
  {section:"Examination & Assessment",q:"Examination using stethoscope is _______.",ans:"Auscultation",alts:[],mem:"AUSCULTation = AUSCULT = listen. Stethoscope = listening to body sounds!",freq:"1× (Feb 2017)"},
  {section:"Examination & Assessment",q:"Instrument to view ear is _______.",ans:"Otoscope",alts:[],mem:"OTO = ear, SCOPE = view. Otoscope = ear-viewing instrument!",freq:"1× (May 2023)"},
  {section:"Examination & Assessment",q:"Unconscious patient assessed by _______.",ans:"Glasgow Coma Scale (GCS)",alts:["glasgow coma scale","gcs"],mem:"GCS = Glasgow Coma Scale. G-C-S = Grades Consciousness State!",freq:"1× (Feb 2011)"},
  {section:"Examination & Assessment",q:"Primary source of data is _______.",ans:"The Patient",alts:["patient"],mem:"PRIMARY source = the PATIENT themselves. Best info comes directly from the patient!",freq:"1× (Aug 2016)"},
  {section:"Examination & Assessment",q:"Data classified as _______ & _______.",ans:"Subjective & Objective",alts:["subjective","objective"],mem:"SUBJECTIVE = patient feels. OBJECTIVE = nurse observes. S-O = Symptoms-Observations!",freq:"1× (Aug 2015)"},
  {section:"Infection Control & Sterilization",q:"Agent inhibiting microorganism growth is _______.",ans:"Antiseptic / Bacteriostatic",alts:["antiseptic","bacteriostatic"],mem:"ANTI = against, SEPTIC = germs. Antiseptic STOPS germ growth!",freq:"2× (Nov 2022, Feb 2019)"},
  {section:"Infection Control & Sterilization",q:"Separation of infected from non-infected is _______.",ans:"Isolation",alts:[],mem:"ISOLATION = keeping infection contained. Separate to protect others!",freq:"1× (Jan 2022)"},
  {section:"Infection Control & Sterilization",q:"Steam under pressure sterilization is _______.",ans:"Autoclaving",alts:["autoclave"],mem:"AUTO-CLAVE = high pressure steam. Best sterilization method!",freq:"2× (Feb 2015, Aug 2012)"},
  {section:"Infection Control & Sterilization",q:"Artificial resistance to disease is _______.",ans:"Immunization / Vaccination",alts:["immunization","vaccination"],mem:"ARTIFICIAL immunity = vaccines teach body to fight. Protection through injection!",freq:"2× (Feb 2015, Sep 2013)"},
  {section:"Nursing History & Identity",q:"Florence Nightingale born on _______.",ans:"12 May 1820",alts:["12 may","may 12","1820"],mem:"12 May 1820 = Florence's birthday = International Nurses Day date!",freq:"2× (Feb 2025, Feb 2012)"},
  {section:"Nursing History & Identity",q:"International Nurses Day is _______.",ans:"12 May",alts:["may 12"],mem:"12th May = Florence Nightingale's birthday = Nurses Day!",freq:"1× (May 2023)"},
  {section:"Nursing History & Identity",q:"Pioneer of Modern Nursing is _______.",ans:"Florence Nightingale",alts:["nightingale","florence"],mem:"FLORENCE NIGHTINGALE = Lady with the Lamp. Pioneer of modern nursing!",freq:"1× (Aug 2016)"},
  {section:"Nursing History & Identity",q:"One pint ≈ _______.",ans:"500 ml",alts:["500ml"],mem:"1 pint = 500ml. Half a litre. Remember for fluid balance!",freq:"1× (Feb 2025)"},
  {section:"Patient Care & Conditions",q:"Post-death stiffness is _______.",ans:"Rigor Mortis",alts:["rigor mortis"],mem:"RIGOR = stiffness, MORTIS = death. Rigor Mortis = death stiffness!",freq:"1× (Sep 2013)"},
  {section:"Patient Care & Conditions",q:"Inability to sleep is _______.",ans:"Insomnia",alts:[],mem:"IN = without, SOMNIA = sleep. Insomnia = cannot sleep!",freq:"1× (Sep 2013)"},
  {section:"Patient Care & Conditions",q:"Air cushion prevents _______.",ans:"Bed Sores / Pressure Ulcers",alts:["bed sores","pressure ulcers"],mem:"Air cushion = distributes weight = prevents PRESSURE on skin = no bed sores!",freq:"2× (July 2025, Aug 2018)"},
  {section:"Patient Care & Conditions",q:"Temperature ≥105°F is _______.",ans:"Hyperpyrexia",alts:[],mem:"HYPER = very high, PYREXIA = fever. Hyperpyrexia = dangerously HIGH fever!",freq:"1× (Feb 2015)"},

let currentTab='fill';
const fillState={};
function getScore(){let c=0,w=0,t=0;Object.values(fillState).forEach(s=>{t++;if(s.status==='correct')c++;else if(s.status==='incorrect')w++;});return{correct:c,wrong:w,total:t};}
function getGrade(p){if(p>=90)return{g:'A+',c:'#4ddd80'};if(p>=80)return{g:'A',c:'#4ddd80'};if(p>=70)return{g:'B',c:'#f5c842'};if(p>=60)return{g:'C',c:'#f5a623'};if(p>=50)return{g:'D',c:'#ff9f43'};return{g:'F',c:'#ff6b6b'};}
function updateScore(){const{correct,wrong,total}=getScore();document.getElementById('sc-total').textContent=total;document.getElementById('sc-correct').textContent=correct;document.getElementById('sc-wrong').textContent=wrong;const p=total>0?Math.round(correct/total*100):null;document.getElementById('sc-pct').textContent=p!==null?p+'%':'—';document.getElementById('progress-bar').style.width=(p||0)+'%';const gb=document.getElementById('sc-grade');if(p!==null){const{g,c}=getGrade(p);gb.textContent=g;gb.style.color=c;gb.style.borderColor=c;}else{gb.textContent='—';gb.style.color='#7a82a0';gb.style.borderColor='#7a82a0';}}
function resetAll(){if(!confirm('Reset all?'))return;Object.keys(fillState).forEach(k=>delete fillState[k]);updateScore();renderAll();}
function checkFill(id,ans,alts){const inp=document.getElementById('input-'+id);const u=inp.value.trim();if(!u)return;const n=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');const ok=[n(ans),...alts.map(n)].some(a=>n(u).includes(a)||a.includes(n(u)));fillState[id]={status:ok?'correct':'incorrect',userAns:u};updateScore();refreshFill(id);}
function skipFill(id){fillState[id]={status:'skipped'};updateScore();refreshFill(id);}
function refreshFill(id){const card=document.getElementById('fcard-'+id);if(!card)return;const s=fillState[id];const item=fillData[parseInt(id)];card.classList.remove('correct','incorrect','skipped');if(s)card.classList.add(s.status);const aa=card.querySelector('.answer-area');if(s){let h='';if(s.status==='correct')h=`<div class="result-ans ok">✅ Correct! "${s.userAns}"</div>`;else if(s.status==='incorrect')h=`<div class="result-ans bad">❌ Wrong: "${s.userAns}"</div><div class="correct-ans">✅ Answer: ${item.ans}</div>`;else h=`<div class="correct-ans">⏭ Skipped — Answer: ${item.ans}</div>`;h+=`<div class="mnemonic">💡 ${item.mem}</div>`;aa.innerHTML=h;}}
function switchTab(t){currentTab=t;document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['fill','meanings','desc'][i]===t));renderAll();}
function getQ(){return document.getElementById('searchBox').value.toLowerCase().trim();}
function renderAll(){const q=getQ();const c=document.getElementById('content');c.innerHTML='';if(currentTab==='fill')renderFill(q,c);else if(currentTab==='meanings')renderMeanings(q,c);else renderDesc(q,c);}
function renderFill(q,container){const secs={};let t=0;fillData.forEach((item,i)=>{if(q&&!item.q.toLowerCase().includes(q)&&!item.ans.toLowerCase().includes(q)&&!item.section.toLowerCase().includes(q)&&!item.mem.toLowerCase().includes(q))return;if(!secs[item.section])secs[item.section]=[];secs[item.section].push({item,i});t++;});document.getElementById('countLine').textContent=`Showing ${t} questions`;if(!t){container.innerHTML='<p class="no-results">No results found.</p>';return;}Object.entries(secs).forEach(([sec,entries])=>{container.insertAdjacentHTML('beforeend',`<div class="section-header">${sec} <span class="section-count">${entries.length} questions</span></div>`);const g=document.createElement('div');g.className='grid';entries.forEach(({item,i})=>{const s=fillState[i];const card=document.createElement('div');card.className=`fill-card ${s?s.status:''}`;card.id='fcard-'+i;let aa='';if(s){if(s.status==='correct')aa=`<div class="result-ans ok">✅ Correct! "${s.userAns}"</div>`;else if(s.status==='incorrect')aa=`<div class="result-ans bad">❌ Wrong: "${s.userAns}"</div><div class="correct-ans">✅ Answer: ${item.ans}</div>`;else aa=`<div class="correct-ans">⏭ Skipped — Answer: ${item.ans}</div>`;aa+=`<div class="mnemonic">💡 ${item.mem}</div>`;}else{aa=`<input class="ans-input" id="input-${i}" type="text" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkFill(${i},'${item.ans.replace(/'/g,"\\'")}',${JSON.stringify(item.alts)})"><button class="btn-check" onclick="checkFill(${i},'${item.ans.replace(/'/g,"\\'")}',${JSON.stringify(item.alts)})">Check ✓</button><button class="btn-skip" onclick="skipFill(${i})">Skip</button>`;}card.innerHTML=`<div class="card-top"><div class="q-text">${item.q}</div><div class="freq">🔁 ${item.freq}</div></div><div class="answer-area">${aa}</div>`;g.appendChild(card);});container.appendChild(g);});}
function renderMeanings(q,container){const secs={};let t=0;meaningsData.forEach((item,i)=>{if(q&&!item.term.toLowerCase().includes(q)&&!item.def.toLowerCase().includes(q)&&!item.section.toLowerCase().includes(q)&&!item.mem.toLowerCase().includes(q))return;if(!secs[item.section])secs[item.section]=[];secs[item.section].push({item,i});t++;});document.getElementById('countLine').textContent=`Showing ${t} definitions`;if(!t){container.innerHTML='<p class="no-results">No results found.</p>';return;}Object.entries(secs).forEach(([sec,entries])=>{container.insertAdjacentHTML('beforeend',`<div class="section-header">${sec} <span class="section-count">${entries.length} terms</span></div>`);const g=document.createElement('div');g.className='grid';entries.forEach(({item})=>{const card=document.createElement('div');card.className='def-card';card.innerHTML=`<div class="def-term">${item.term}</div><div class="def-text">${item.def}</div><div class="def-mem">💡 ${item.mem}</div><div class="def-freq">🔁 ${item.freq}</div>`;g.appendChild(card);});container.appendChild(g);});}
function renderDesc(q,container){let t=0;const g=document.createElement('div');g.className='grid';descData.forEach(item=>{if(q&&!item.q.toLowerCase().includes(q)&&!item.years.toLowerCase().includes(q))return;const card=document.createElement('div');card.className='desc-card';card.innerHTML=`<div class="desc-q">📋 ${item.q}</div><div class="desc-years">📅 ${item.years}</div><div class="desc-freq">🔁 Asked ${item.freq}</div>`;g.appendChild(card);t++;});document.getElementById('countLine').textContent=`Showing ${t} descriptive topics`;if(!t){container.innerHTML='<p class="no-results">No results found.</p>';return;}container.appendChild(g);}
updateScore();renderAll();
