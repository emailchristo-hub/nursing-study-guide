<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundamentals of Nursing · Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0e1a;--surface:#141828;--card:#1c2235;--border:#2a3050;--accent:#ff9f43;--red:#ff6b6b;--green:#4ddd80;--blue:#5b9cf6;--teal:#38d9c0;--text:#e8ecf8;--muted:#7a82a0;--tag:#1e2640;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.hero{background:linear-gradient(135deg,#0b0e1a,#1a140e);border-bottom:1px solid var(--border);padding:36px 20px 28px;text-align:center;position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.8rem;text-decoration:none;margin-bottom:16px;transition:color .2s;}
.back-btn:hover{color:var(--accent);}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,4vw,2.4rem);font-weight:900;color:var(--accent);margin-bottom:6px;}
.hero p{color:var(--muted);font-size:.88rem;margin-bottom:18px;}
.scoreboard{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.score-box{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:10px 18px;text-align:center;min-width:90px;}
.score-val{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;line-height:1;}
.score-label{font-size:.65rem;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
.grade-badge{display:inline-block;font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;padding:6px 20px;border-radius:50px;border:2px solid;transition:all .4s;}
.progress-bar-wrap{background:var(--bg);border-radius:8px;height:10px;overflow:hidden;margin:10px auto;max-width:400px;}
.progress-bar{height:100%;border-radius:8px;transition:width 1s ease;background:linear-gradient(90deg,var(--accent),#f5c842);}
.controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);}
.tab{padding:7px 15px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;white-space:nowrap;}
.tab.active{background:var(--accent);border-color:var(--accent);color:#0b0e1a;}
.tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}
.search-wrap{position:relative;width:100%;max-width:300px;}
.search{width:100%;padding:7px 14px 7px 34px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:.83rem;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;}
.search:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem;pointer-events:none;}
.btn-reset{padding:7px 14px;border-radius:20px;border:1.5px solid var(--red);background:transparent;color:var(--red);cursor:pointer;font-size:.78rem;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .2s;}
.btn-reset:hover{background:var(--red);color:white;}
.main{padding:18px;max-width:1200px;margin:0 auto;}
.section-header{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--accent);border-left:4px solid var(--accent);padding-left:10px;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
.section-count{font-size:.7rem;color:var(--muted);font-family:'DM Sans',sans-serif;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:10px;}
.fill-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px;transition:all .2s;}
.fill-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.fill-card.correct{border-color:var(--green);background:#1c2d24;}
.fill-card.incorrect{border-color:var(--red);background:#2d1c1c;}
.fill-card.skipped{border-color:var(--blue);opacity:.75;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.q-text{font-weight:500;font-size:.88rem;color:var(--text);flex:1;line-height:1.5;}
.freq{background:var(--tag);color:var(--accent);font-size:.66rem;font-weight:700;padding:2px 7px;border-radius:6px;white-space:nowrap;flex-shrink:0;border:1px solid rgba(255,159,67,.2);}
.ans-input{width:100%;padding:7px 11px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:.86rem;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s;margin-top:6px;}
.ans-input:focus{border-color:var(--accent);}
.btn-row{display:flex;gap:6px;margin-top:7px;}
.btn-check{padding:6px 14px;border-radius:7px;border:none;background:var(--accent);color:#0b0e1a;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-check:hover{background:#e8902e;}
.btn-skip{padding:6px 12px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-skip:hover{border-color:var(--blue);color:var(--blue);}
.result-ans{font-size:.86rem;font-weight:600;margin-top:6px;}
.result-ans.ok{color:var(--green);}
.result-ans.bad{color:var(--red);}
.correct-ans{font-size:.82rem;color:var(--accent);margin-top:4px;font-weight:600;}
.explanation{font-size:.78rem;color:var(--teal);margin-top:4px;background:rgba(56,217,192,.06);border-radius:6px;padding:5px 8px;border-left:3px solid var(--teal);line-height:1.4;}
.mnemonic{font-size:.76rem;color:var(--muted);font-style:italic;background:var(--tag);border-radius:6px;padding:5px 8px;border-left:3px solid var(--accent);margin-top:5px;line-height:1.4;}
.tf-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;transition:all .2s;}
.tf-card:hover{border-color:var(--accent);}
.tf-card.correct{border-color:var(--green);background:#1c2d24;}
.tf-card.incorrect{border-color:var(--red);background:#2d1c1c;}
.tf-q{font-size:.88rem;font-weight:500;margin-bottom:9px;line-height:1.5;}
.tf-buttons{display:flex;gap:7px;margin-bottom:5px;}
.tf-btn{flex:1;padding:7px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.tf-btn.true-btn:hover{border-color:var(--green);color:var(--green);}
.tf-btn.false-btn:hover{border-color:var(--red);color:var(--red);}
.tf-btn.selected-true{background:#1a3d2b;border-color:var(--green);color:var(--green);}
.tf-btn.selected-false{background:#3d1a1a;border-color:var(--red);color:var(--red);}
.tf-btn:disabled{cursor:not-allowed;opacity:.6;}
.tf-result{font-size:.8rem;margin-top:5px;}
.tf-tip{font-size:.76rem;color:var(--muted);font-style:italic;margin-top:4px;background:var(--tag);border-radius:6px;padding:5px 8px;border-left:3px solid var(--teal);line-height:1.4;}
.tf-freq{font-size:.66rem;color:var(--accent);font-weight:700;margin-top:4px;}
.def-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:14px;transition:all .2s;}
.def-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.def-term{font-family:'Playfair Display',serif;font-size:1rem;color:var(--accent);margin-bottom:5px;}
.def-text{font-size:.83rem;color:var(--text);margin-bottom:7px;line-height:1.6;}
.def-mem{font-size:.76rem;color:var(--muted);font-style:italic;background:var(--tag);border-radius:6px;padding:5px 8px;border-left:3px solid var(--accent);line-height:1.4;}
.def-freq{font-size:.66rem;color:var(--accent);font-weight:700;margin-top:5px;}
.count-line{text-align:center;color:var(--muted);font-size:.78rem;margin-bottom:8px;}
.no-results{text-align:center;color:var(--muted);padding:40px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fill-card,.tf-card,.def-card{animation:fadeIn .25s ease both;}
</style>
</head>
<body>
<div class="hero">
  <a href="index.html" class="back-btn">← Back to Home</a>
  <h1>🩺 Fundamentals of Nursing</h1>
  <p>FON · Fill in Blank · True/False · Meanings · Self-Evaluation</p>
  <div class="scoreboard">
    <div class="score-box"><div class="score-val" style="color:var(--accent)" id="sc-total">0</div><div class="score-label">Attempted</div></div>
    <div class="score-box"><div class="score-val" style="color:var(--green)" id="sc-correct">0</div><div class="score-label">Correct</div></div>
    <div class="score-box"><div class="score-val" style="color:var(--red)" id="sc-wrong">0</div><div class="score-label">Wrong</div></div>
    <div class="score-box"><div class="score-val" style="color:var(--blue)" id="sc-pct">—</div><div class="score-label">Score %</div></div>
    <div class="score-box"><div class="grade-badge" id="sc-grade" style="font-size:1.1rem;padding:5px 14px;color:#7a82a0;border-color:#7a82a0;">—</div><div class="score-label">Grade</div></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
</div>
<div class="controls">
  <button class="tab active" onclick="switchTab('fill')">📝 Fill in Blank</button>
  <button class="tab" onclick="switchTab('tf')">✅ True / False</button>
  <button class="tab" onclick="switchTab('meanings')">📖 Meanings</button>
  <div class="search-wrap"><span class="search-icon">🔍</span><input class="search" type="text" id="searchBox" placeholder="Search..." oninput="renderAll()"></div>
  <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
</div>
<div class="main"><p class="count-line" id="countLine"></p><div id="content"></div></div>
<script>

const fillData=[
  {section:"Respiratory & Breathing",q:"Lack of oxygen in the tissue is called _______.",ans:"Hypoxia",alts:[],exp:"Hypo = less, oxia = oxygen in tissue. Tissues not getting enough O2.",mem:"HYPO + OXIA = low oxygen in TISSUES. Tissues starving for oxygen!",freq:"5×"},
  {section:"Respiratory & Breathing",q:"Lack of oxygen in the blood is called _______.",ans:"Hypoxemia",alts:[],exp:"Hypoxemia = low O2 specifically in BLOOD. Different from hypoxia (tissue).",mem:"HYPO + OXEMIA = low oxygen in BLOOD. Blood lacks O2!",freq:"2×"},
  {section:"Respiratory & Breathing",q:"Difficulty in breathing is called _______.",ans:"Dyspnea",alts:["dyspnoea"],exp:"Dys = difficult, pnea = breathing. Labored or hard breathing.",mem:"DYSpnea = DYSfunction breathing. Can't breathe properly!",freq:"2×"},
  {section:"Respiratory & Breathing",q:"Difficulty in swallowing is called _______.",ans:"Dysphagia",alts:[],exp:"Dys = difficult, phagia = swallowing/eating. Food gets stuck when swallowing.",mem:"DYS + PHAGIA = difficult swallowing. Food gets stuck = Dysphagia!",freq:"3×"},
  {section:"Respiratory & Breathing",q:"Bleeding from the nose is _______.",ans:"Epistaxis",alts:[],exp:"Epi = upon, staxis = dripping. Nosebleed = epistaxis.",mem:"EPISTAXIS = nose dripping blood. Epi + staxis = upon + dripping!",freq:"3×"},
  {section:"Respiratory & Breathing",q:"Blood in the sputum is _______.",ans:"Hemoptysis",alts:["haemoptysis"],exp:"Hemo = blood, ptysis = spitting. Coughing up blood from lungs.",mem:"HEMO + PTYSIS = blood + spitting. Spitting blood = Hemoptysis!",freq:"2×"},
  {section:"Respiratory & Breathing",q:"Increase in respiratory rate is _______.",ans:"Tachypnea",alts:["tachypnoea"],exp:"Tachy = fast, pnea = breathing. Respiratory rate above 20/min.",mem:"TACHY = fast. TACHYpnea = FAST breathing!",freq:"2×"},
  {section:"Respiratory & Breathing",q:"Total cessation of breathing is _______.",ans:"Apnea",alts:["apnoea"],exp:"A = without, pnea = breathing. Complete stop of breathing.",mem:"APNEA = A (without) + pnea (breathing). NO breathing!",freq:"1×"},
  {section:"Respiratory & Breathing",q:"Bluish discoloration of skin & mucous membrane is _______.",ans:"Cyanosis",alts:[],exp:"Cyano = blue (Greek). Blue skin due to low oxygen levels in blood.",mem:"CYANO = blue. Blue lips/nails = oxygen emergency = Cyanosis!",freq:"2×"},
  {section:"Respiratory & Breathing",q:"Phonation is a function of _______.",ans:"Larynx",alts:[],exp:"Larynx contains vocal cords. Voice production (phonation) happens here.",mem:"PHONation = voice. Larynx = voice BOX. Phone = voice!",freq:"1×"},
  {section:"Oral & GI Health",q:"Loss of appetite is _______.",ans:"Anorexia",alts:[],exp:"An = without, orexia = appetite. No desire to eat.",mem:"AN + OREXIA = without appetite. No hunger = Anorexia!",freq:"4×"},
  {section:"Oral & GI Health",q:"Inflammation of oral mucosa is _______.",ans:"Stomatitis",alts:[],exp:"Stomato = mouth, itis = inflammation. Inflamed mouth lining.",mem:"STOMATO + ITIS = mouth inflammation. Mouth sores = Stomatitis!",freq:"3×"},
  {section:"Oral & GI Health",q:"Inflammation of gums is _______.",ans:"Gingivitis",alts:[],exp:"Gingiva = gums, itis = inflammation. Red, swollen, bleeding gums.",mem:"GINGIVA + ITIS = gum disease. Bleeding gums = Gingivitis!",freq:"1×"},
  {section:"Oral & GI Health",q:"Bleeding from gums is _______.",ans:"Gingival bleeding / Gingiorrhagia",alts:["gingival bleeding","gingiorrhagia"],exp:"Gingival = of the gums, rrhagia = bleeding. Gum hemorrhage.",mem:"GINGIVAL + RRHAGIA = gum bleeding. Gums bleed = Gingiorrhagia!",freq:"1×"},
  {section:"Oral & GI Health",q:"Inflammation of the tongue is _______.",ans:"Glossitis",alts:[],exp:"Gloss = tongue (Greek), itis = inflammation. Painful red swollen tongue.",mem:"GLOSS = tongue + ITIS. Sore tongue = Glossitis!",freq:"1×"},
  {section:"Oral & GI Health",q:"Bad breath is _______.",ans:"Halitosis",alts:[],exp:"Hali = breath (Latin), tosis = condition. Persistent bad breath.",mem:"HALI + TOSIS = bad breath condition. Hali = breath in Latin!",freq:"1×"},
  {section:"Oral & GI Health",q:"Cheilosis occurs due to deficiency of _______.",ans:"Vitamin B2 (Riboflavin)",alts:["vitamin b2","riboflavin","b2"],exp:"Cheilosis = cracked, red lip corners. Caused by Riboflavin (B2) deficiency.",mem:"Cheilosis = cracked CHEILO (lips). B2 = Beautiful lips need it!",freq:"1×"},
  {section:"Oral & GI Health",q:"Cheilosis = _______.",ans:"Cracking/ulceration of lips & mouth angles",alts:["cracking","ulceration of lips"],exp:"Cheilosis = lesions at the corners of the mouth. Sign of B2 deficiency.",mem:"CHEIL = lip (Greek). Cheilosis = cracked lip corners!",freq:"1×"},
  {section:"Oral & GI Health",q:"Gas in GI tract is _______.",ans:"Flatulence",alts:[],exp:"Flatus = gas. Excessive gas in stomach/intestines causing bloating.",mem:"FLATulence = gas that goes FLAT! Trapped wind = Flatulence!",freq:"1×"},
  {section:"Oral & GI Health",q:"Lack of roughage leads to _______.",ans:"Constipation",alts:[],exp:"Roughage (dietary fibre) adds bulk and water to stool. Without it, constipation occurs.",mem:"No fibre = no bulk = no movement = CONSTIPATION!",freq:"1×"},
  {section:"Oral & GI Health",q:"Constipation prevented by _______.",ans:"High fiber diet & plenty of fluids",alts:["high fiber","fibre","fluids"],exp:"Fibre increases stool bulk; fluids soften stool. Together they prevent constipation.",mem:"FIBRE + FLUIDS = no constipation. Two F's prevent the problem!",freq:"1×"},
  {section:"Urine & Excretion",q:"Blood in urine is _______.",ans:"Hematuria",alts:["haematuria"],exp:"Hemato = blood, uria = urine. Blood visible in urine = hematuria.",mem:"HEMATO + URIA = blood in urine. Red urine = Hematuria!",freq:"1×"},
  {section:"Urine & Excretion",q:"Glucose in urine is _______.",ans:"Glycosuria",alts:[],exp:"Glyco = sugar, suria = urine. Glucose spills into urine when blood sugar is high.",mem:"GLYCO + SURIA = sugar in urine. Diabetics have Glycosuria!",freq:"1×"},
  {section:"Urine & Excretion",q:"Test for urinary sugar is _______.",ans:"Benedict's Test",alts:["benedict"],exp:"Benedict's solution turns orange/red in presence of reducing sugars like glucose.",mem:"BENEDICT tests for sugar. Changes colour with glucose present!",freq:"1×"},
  {section:"Urine & Excretion",q:"Specific gravity of urine = 1.010-1.030, measured by _______.",ans:"Urinometer",alts:[],exp:"Urinometer = instrument to measure specific gravity (concentration) of urine.",mem:"URINometer = measures URINE density. Like a thermometer for urine!",freq:"2×"},
  {section:"Urine & Excretion",q:"Blue litmus turns red when urine is _______.",ans:"Acidic",alts:["acid"],exp:"Acid turns blue litmus RED. Normal urine is slightly acidic (pH 4.6-8.0).",mem:"ACID turns blue to RED. Blue litmus + acid = RED!",freq:"1×"},
  {section:"Urine & Excretion",q:"Frequent night urination is _______.",ans:"Nocturia",alts:[],exp:"Noctu = night, uria = urine. Waking repeatedly at night to pass urine.",mem:"NOCTU + URIA = night urination. Nocturia = nighttime toilet visits!",freq:"1×"},
  {section:"Urine & Excretion",q:"Removal of body waste is _______.",ans:"Excretion",alts:[],exp:"Excretion = elimination of metabolic waste products from the body.",mem:"EXcretion = EXpelling waste. Body removes what it doesn't need!",freq:"1×"},
  {section:"Urine & Excretion",q:"Main organ for drug excretion is _______.",ans:"Kidney",alts:[],exp:"Most drugs and metabolites are filtered by kidneys and excreted in urine.",mem:"KIDNEY = body's filter. Drugs exit mainly through kidneys!",freq:"1×"},
  {section:"Examination & Assessment",q:"Visual examination is _______.",ans:"Inspection",alts:[],exp:"Inspection = using eyes to examine patient. First step of physical examination.",mem:"INspection = looking IN carefully. Eyes only = Inspection!",freq:"2×"},
  {section:"Examination & Assessment",q:"Examination by tapping is _______.",ans:"Percussion",alts:[],exp:"Percussion = tapping body surface to assess underlying organs. Used for chest, abdomen.",mem:"PERCussion = tapping like PERCUSSION drums. Tap the body!",freq:"2×"},
  {section:"Examination & Assessment",q:"Examination using stethoscope is _______.",ans:"Auscultation",alts:[],exp:"Auscultation = listening to body sounds with stethoscope. Heart, lungs, bowel sounds.",mem:"AUSCULTation = listen. Stethoscope = listening instrument!",freq:"1×"},
  {section:"Examination & Assessment",q:"Instrument to view ear is _______.",ans:"Otoscope",alts:[],exp:"Oto = ear, scope = view. Used to examine ear canal and tympanic membrane.",mem:"OTO = ear + SCOPE = view. Otoscope looks in the ear!",freq:"1×"},
  {section:"Examination & Assessment",q:"Unconscious patient assessed by _______.",ans:"Glasgow Coma Scale (GCS)",alts:["glasgow coma scale","gcs"],exp:"GCS scores Eye (1-4) + Verbal (1-5) + Motor (1-6) responses. Max 15, min 3.",mem:"GCS = Grades Consciousness State. Eyes + Voice + Movement = GCS score!",freq:"1×"},
  {section:"Examination & Assessment",q:"Primary source of data is _______.",ans:"The Patient",alts:["patient"],exp:"Primary source = directly from the patient (what they say/feel = subjective data).",mem:"PRIMARY source = PATIENT directly. Best info comes from the patient!",freq:"1×"},
  {section:"Examination & Assessment",q:"Data classified as _______ & _______.",ans:"Subjective & Objective",alts:["subjective","objective"],exp:"Subjective = patient's feelings/complaints. Objective = measurable observations by nurse.",mem:"S = Symptoms (patient says). O = Observable (nurse measures). S+O = complete data!",freq:"1×"},
  {section:"Examination & Assessment",q:"Trendelenburg position used for _______.",ans:"Pelvic organ examination",alts:["pelvic"],exp:"Trendelenburg = head down, feet elevated. Gravity moves intestines away from pelvis.",mem:"Trendelenburg = head DOWN. Gravity exposes pelvic organs for examination!",freq:"1×"},
  {section:"Infection Control",q:"Agent inhibiting microorganism growth is _______.",ans:"Antiseptic / Bacteriostatic",alts:["antiseptic","bacteriostatic"],exp:"Antiseptic = kills/inhibits microbes on living tissue. Bacteriostatic = stops bacterial growth.",mem:"ANTI + SEPTIC = against germs on living tissue. Stops germ growth!",freq:"2×"},
  {section:"Infection Control",q:"Separation of infected from non-infected is _______.",ans:"Isolation",alts:[],exp:"Isolation = separating infected patient to prevent spread of infection to others.",mem:"ISOLATION = separate. Keep infected patient ALONE to protect others!",freq:"1×"},
  {section:"Infection Control",q:"Steam under pressure sterilization is _______.",ans:"Autoclaving",alts:["autoclave"],exp:"Autoclave uses 121°C steam at 15 psi pressure. Kills all microorganisms including spores.",mem:"AUTO-CLAVE = pressurized steam. Kills EVERYTHING including resistant spores!",freq:"2×"},
  {section:"Infection Control",q:"Artificial resistance to disease is _______.",ans:"Immunization / Vaccination",alts:["immunization","vaccination"],exp:"Vaccines stimulate immune system to produce antibodies without causing actual disease.",mem:"VACCINATION = artificial immunity. Vaccine trains body to fight disease!",freq:"2×"},
  {section:"Vital Signs",q:"Pulse rate <60/min is _______.",ans:"Bradycardia",alts:[],exp:"Brady = slow, cardia = heart. Heart rate below 60 bpm = bradycardia.",mem:"BRADY = slow. BRADYcardia = SLOW heart (<60 bpm)!",freq:"2×"},
  {section:"Vital Signs",q:"BP measured by _______.",ans:"Sphygmomanometer",alts:["sphygmo"],exp:"Sphygmo = pulse, mano = pressure, meter = measure. The blood pressure measuring device.",mem:"SPHYGMO-MANO-METER = pulse pressure measurer. The BP machine!",freq:"2×"},
  {section:"Vital Signs",q:"High blood pressure is _______.",ans:"Hypertension",alts:[],exp:"Hyper = high, tension = pressure. BP consistently above 140/90 mmHg.",mem:"HYPER + TENSION = HIGH BP. Hyper = too much!",freq:"1×"},
  {section:"Vital Signs",q:"Low blood pressure is _______.",ans:"Hypotension",alts:[],exp:"Hypo = low, tension = pressure. BP below 90/60 mmHg.",mem:"HYPO + TENSION = LOW BP. Hypo = too little!",freq:"1×"},
  {section:"Vital Signs",q:"Normal BP is _______.",ans:"120/80 mmHg",alts:["120/80"],exp:"Systolic 120 (heart contracting) / Diastolic 80 (heart relaxing) = normal adult BP.",mem:"120/80 = the perfect score for blood pressure!",freq:"1×"},
  {section:"Vital Signs",q:"Low hemoglobin is _______.",ans:"Anemia",alts:["anaemia"],exp:"Anemia = low hemoglobin or RBC count. Causes fatigue, pallor, breathlessness.",mem:"ANEMIA = no iron = no hemoglobin = pale and tired!",freq:"1×"},
  {section:"Patient Care",q:"Post-death stiffness is _______.",ans:"Rigor Mortis",alts:["rigor mortis"],exp:"Rigor mortis = muscle stiffening after death due to ATP depletion. Begins 2-6 hours post-death.",mem:"RIGOR = stiffness, MORTIS = death. Death stiffness = Rigor Mortis!",freq:"1×"},
  {section:"Patient Care",q:"Inability to sleep is _______.",ans:"Insomnia",alts:[],exp:"Insomnia = chronic difficulty falling asleep or staying asleep. In = without, somnia = sleep.",mem:"IN + SOMNIA = without sleep. Can't sleep = Insomnia!",freq:"1×"},
  {section:"Patient Care",q:"Air cushion prevents _______.",ans:"Bed Sores / Pressure Ulcers",alts:["bed sores","pressure ulcers","decubitus"],exp:"Air/alternating pressure cushions distribute body weight evenly, preventing pressure sores.",mem:"Air cushion = no pressure = no bed sores. Protect bony prominences!",freq:"2×"},
  {section:"Patient Care",q:"Temperature >=105°F is _______.",ans:"Hyperpyrexia",alts:[],exp:"Hyperpyrexia = dangerously high fever >=105°F (40.5°C). Medical emergency.",mem:"HYPER + PYREXIA = very HIGH fever. Dangerous temperature!",freq:"1×"},

  {section:"Procedures & Treatments",term:"Immunization",def:"The process of making a person immune to disease by administering vaccines.",mem:"IMMUNIzation = giving IMMUNIty. Vaccines train body to fight disease!",freq:"1×"},
  {section:"Procedures & Treatments",term:"Splint",def:"A device used to immobilize and support a fractured or injured limb.",mem:"SPLINT = immobilizer. Keeps broken bones STILL so they can heal!",freq:"1×"},
  {section:"Procedures & Treatments",term:"Body Mechanics",def:"The proper use of body posture and movement to prevent injury and fatigue.",mem:"Body MECHANICS = use body efficiently. Lift with legs not back!",freq:"1×"},
  {section:"Procedures & Treatments",term:"Exercise",def:"Planned physical activity performed to improve or maintain health.",mem:"EXERCISE = planned movement for health. Regular exercise = healthy body!",freq:"1×"},

  {section:"End of Life",term:"Autopsy",def:"A post-mortem examination to determine the cause of death.",mem:"AUTO + OPSY = self-examine. Post-mortem to find cause of death!",freq:"1×"},
  {section:"End of Life",term:"Embalming",def:"Preservation of a dead body by chemical treatment.",mem:"EMBALM = preserve. Chemical treatment slows body decomposition!",freq:"1×"},

];


let currentTab='fill';
const fillState={},tfState={};

function getScore(){{
  let c=0,w=0,t=0;
  Object.values(fillState).forEach(s=>{{t++;if(s.status==='correct')c++;else if(s.status==='incorrect')w++;}});
  Object.values(tfState).forEach(s=>{{t++;if(s.status==='correct')c++;else if(s.status==='incorrect')w++;}});
  return{{correct:c,wrong:w,total:t}};
}}

function getGrade(p){{
  if(p>=90)return{{g:'A+',c:'#4ddd80'}};
  if(p>=80)return{{g:'A',c:'#4ddd80'}};
  if(p>=70)return{{g:'B',c:'#f5c842'}};
  if(p>=60)return{{g:'C',c:'#f5a623'}};
  if(p>=50)return{{g:'D',c:'#ff9f43'}};
  return{{g:'F',c:'#ff6b6b'}};
}}

function updateScore(){{
  const{{correct,wrong,total}}=getScore();
  document.getElementById('sc-total').textContent=total;
  document.getElementById('sc-correct').textContent=correct;
  document.getElementById('sc-wrong').textContent=wrong;
  const p=total>0?Math.round(correct/total*100):null;
  document.getElementById('sc-pct').textContent=p!==null?p+'%':'—';
  document.getElementById('progress-bar').style.width=(p||0)+'%';
  const gb=document.getElementById('sc-grade');
  if(p!==null){{const{{g,c}}=getGrade(p);gb.textContent=g;gb.style.color=c;gb.style.borderColor=c;}}
  else{{gb.textContent='—';gb.style.color='#7a82a0';gb.style.borderColor='#7a82a0';}}
}}

function resetAll(){{
  if(!confirm('Reset all answers?'))return;
  Object.keys(fillState).forEach(k=>delete fillState[k]);
  Object.keys(tfState).forEach(k=>delete tfState[k]);
  updateScore();renderAll();
}}

function checkFill(id){{
  const inp=document.getElementById('input-'+id);
  if(!inp)return;
  const u=inp.value.trim();
  if(!u)return;
  const item=fillData[parseInt(id)];
  if(!item)return;
  const n=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const nu=n(u);
  const allAns=[n(item.ans),...(item.alts||[]).map(n)];
  const ok=allAns.some(a=>nu.includes(a)||a.includes(nu));
  fillState[id]={{status:ok?'correct':'incorrect',userAns:u}};
  updateScore();
  refreshFill(id);
}}

function skipFill(id){{
  fillState[id]={{status:'skipped'}};
  updateScore();
  refreshFill(id);
}}

function refreshFill(id){{
  const card=document.getElementById('fcard-'+id);
  if(!card)return;
  const s=fillState[id];
  const item=fillData[parseInt(id)];
  if(!item)return;
  card.classList.remove('correct','incorrect','skipped');
  if(s)card.classList.add(s.status);
  const aa=card.querySelector('.answer-area');
  if(!aa||!s)return;
  let h='';
  if(s.status==='correct'){{
    h=`<div class="result-ans ok">✅ Correct! "${{s.userAns}}"</div><div class="mnemonic">💡 ${{item.mem}}</div>`;
  }}else if(s.status==='incorrect'){{
    h=`<div class="result-ans bad">❌ Your answer: "${{s.userAns}}"</div><div class="correct-ans">✅ Correct Answer: <strong>${{item.ans}}</strong></div><div class="mnemonic">💡 ${{item.mem}}</div>`;
  }}else{{
    h=`<div class="correct-ans">⏭ Skipped — Answer: <strong>${{item.ans}}</strong></div><div class="mnemonic">💡 ${{item.mem}}</div>`;
  }}
  aa.innerHTML=h;
}}

function checkTF(id,chosen){{
  const item=tfData[parseInt(id)];
  if(!item)return;
  tfState[id]={{status:(chosen===item.ans)?'correct':'incorrect',chosen}};
  updateScore();
  refreshTF(id);
}}

function refreshTF(id){{
  const card=document.getElementById('tfcard-'+id);
  if(!card)return;
  const s=tfState[id];
  const item=tfData[parseInt(id)];
  card.classList.remove('correct','incorrect');
  if(s){{
    card.classList.add(s.status);
    const tb=card.querySelector('.true-btn');
    const fb=card.querySelector('.false-btn');
    if(tb){{tb.disabled=true;tb.classList.toggle('selected-true',s.chosen===true);}}
    if(fb){{fb.disabled=true;fb.classList.toggle('selected-false',s.chosen===false);}}
    const rd=card.querySelector('.tf-result');
    if(rd)rd.innerHTML=s.status==='correct'
      ?`<span style="color:var(--green)">✅ Correct!</span>`
      :`<span style="color:var(--red)">❌ Wrong — Correct Answer: <strong style="color:var(--green)">${{item.ans?'TRUE ✓':'FALSE ✗'}}</strong></span>`;
    const td=card.querySelector('.tf-tip');
    if(td)td.style.display='block';
  }}
}}

function switchTab(t){{
  currentTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['fill','tf','meanings'][i]===t));
  renderAll();
}}

function getQ(){{return document.getElementById('searchBox').value.toLowerCase().trim();}}

function renderAll(){{
  const q=getQ();
  const c=document.getElementById('content');
  c.innerHTML='';
  if(currentTab==='fill')renderFill(q,c);
  else if(currentTab==='tf')renderTF(q,c);
  else renderMeanings(q,c);
}}

function renderFill(q,container){{
  const secs={{}};let t=0;
  fillData.forEach((item,i)=>{{
    if(q&&![item.q,item.ans,item.section,item.mem].some(s=>s.toLowerCase().includes(q)))return;
    if(!secs[item.section])secs[item.section]=[];
    secs[item.section].push({{item,i}});t++;
  }});
  document.getElementById('countLine').textContent=`Showing ${{t}} questions`;
  if(!t){{container.innerHTML='<p class="no-results">No results found.</p>';return;}}
  Object.entries(secs).forEach(([sec,entries])=>{{
    container.insertAdjacentHTML('beforeend',`<div class="section-header">${{sec}} <span class="section-count">${{entries.length}} questions</span></div>`);
    const g=document.createElement('div');g.className='grid';
    entries.forEach(({{item,i}})=>{{
      const s=fillState[i];
      const card=document.createElement('div');
      card.className=`fill-card ${{s?s.status:''}}`;
      card.id='fcard-'+i;
      let aa='';
      if(s){{
        if(s.status==='correct'){{
          aa=`<div class="result-ans ok">✅ Correct! "${{s.userAns}}"</div><div class="mnemonic">💡 ${{item.mem}}</div>`;
        }}else if(s.status==='incorrect'){{
          aa=`<div class="result-ans bad">❌ Your answer: "${{s.userAns}}"</div><div class="correct-ans">✅ Correct Answer: <strong>${{item.ans}}</strong></div><div class="mnemonic">💡 ${{item.mem}}</div>`;
        }}else{{
          aa=`<div class="correct-ans">⏭ Skipped — Answer: <strong>${{item.ans}}</strong></div><div class="mnemonic">💡 ${{item.mem}}</div>`;
        }}
      }}else{{
        aa=`<input class="ans-input" id="input-${{i}}" type="text" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkFill(${{i}})">
        <div class="btn-row"><button class="btn-check" onclick="checkFill(${{i}})">Check ✓</button><button class="btn-skip" onclick="skipFill(${{i}})">Skip</button></div>`;
      }}
      card.innerHTML=`<div class="card-top"><div class="q-text">${{item.q}}</div><div class="freq">🔁 ${{item.freq}}</div></div><div class="answer-area">${{aa}}</div>`;
      g.appendChild(card);
    }});
    container.appendChild(g);
  }});
}}

function renderTF(q,container){{
  const secs={{}};let t=0;
  tfData.forEach((item,i)=>{{
    if(q&&![item.q,item.tip,item.section].some(s=>s.toLowerCase().includes(q)))return;
    if(!secs[item.section])secs[item.section]=[];
    secs[item.section].push({{item,i}});t++;
  }});
  document.getElementById('countLine').textContent=`Showing ${{t}} statements`;
  if(!t){{container.innerHTML='<p class="no-results">No results found.</p>';return;}}
  Object.entries(secs).forEach(([sec,entries])=>{{
    container.insertAdjacentHTML('beforeend',`<div class="section-header">${{sec}} <span class="section-count">${{entries.length}} statements</span></div>`);
    const g=document.createElement('div');g.className='grid';
    entries.forEach(({{item,i}})=>{{
      const s=tfState[i];
      const card=document.createElement('div');
      card.className=`tf-card ${{s?s.status:''}}`;
      card.id='tfcard-'+i;
      const rh=s?(s.status==='correct'
        ?`<span style="color:var(--green)">✅ Correct!</span>`
        :`<span style="color:var(--red)">❌ Wrong — Correct Answer: <strong style="color:var(--green)">${{item.ans?'TRUE ✓':'FALSE ✗'}}</strong></span>`):'';
      card.innerHTML=`<div class="tf-q">${{item.q}}</div>
        <div class="tf-buttons">
          <button class="tf-btn true-btn ${{s&&s.chosen===true?'selected-true':''}}" onclick="checkTF(${{i}},true)" ${{s?'disabled':''}}>✓ TRUE</button>
          <button class="tf-btn false-btn ${{s&&s.chosen===false?'selected-false':''}}" onclick="checkTF(${{i}},false)" ${{s?'disabled':''}}>✗ FALSE</button>
        </div>
        <div class="tf-result">${{rh}}</div>
        <div class="tf-tip" style="display:${{s?'block':'none'}}">💡 ${{item.tip}}</div>
        <div class="tf-freq">🔁 ${{item.freq}}</div>`;
      g.appendChild(card);
    }});
    container.appendChild(g);
  }});
}}

function renderMeanings(q,container){{
  const secs={{}};let t=0;
  meaningsData.forEach((item,i)=>{{
    if(q&&![item.term,item.def,item.section,item.mem].some(s=>s.toLowerCase().includes(q)))return;
    if(!secs[item.section])secs[item.section]=[];
    secs[item.section].push({{item,i}});t++;
  }});
  document.getElementById('countLine').textContent=`Showing ${{t}} definitions`;
  if(!t){{container.innerHTML='<p class="no-results">No results found.</p>';return;}}
  Object.entries(secs).forEach(([sec,entries])=>{{
    container.insertAdjacentHTML('beforeend',`<div class="section-header">${{sec}} <span class="section-count">${{entries.length}} terms</span></div>`);
    const g=document.createElement('div');g.className='grid';
    entries.forEach(({{item}})=>{{
      const card=document.createElement('div');card.className='def-card';
      card.innerHTML=`<div class="def-term">${{item.term}}</div><div class="def-text">${{item.def}}</div><div class="def-mem">💡 ${{item.mem}}</div><div class="def-freq">🔁 ${{item.freq}}</div>`;
      g.appendChild(card);
    }});
    container.appendChild(g);
  }});
}}

updateScore();renderAll();

</script>
</body>
</html>
