<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Health Nursing · Self-Evaluation Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e1a;
  --surface: #141828;
  --card: #1c2235;
  --border: #2a3050;
  --gold: #f5c842;
  --teal: #38d9c0;
  --red: #ff6b6b;
  --green: #4ddd80;
  --blue: #5b9cf6;
  --text: #e8ecf8;
  --muted: #7a82a0;
  --tag: #1e2640;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

.hero {
  background: linear-gradient(135deg, #0b0e1a 0%, #0e1a14 40%, #0b1510 100%);
  border-bottom: 1px solid var(--border);
  padding: 40px 20px 30px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  background: radial-gradient(ellipse, rgba(56,217,192,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 5vw, 2.8rem); font-weight: 900; color: var(--teal); letter-spacing: -0.5px; margin-bottom: 6px; }
.hero p { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }

.scoreboard { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.score-box { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 12px 20px; text-align: center; min-width: 100px; transition: transform 0.2s; }
.score-box:hover { transform: translateY(-2px); }
.score-val { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; line-height: 1; }
.score-val.gold { color: var(--teal); }
.score-val.green { color: var(--green); }
.score-val.red { color: var(--red); }
.score-val.blue { color: var(--blue); }
.score-label { font-size: 0.7rem; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.grade-badge { display: inline-block; font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; padding: 8px 24px; border-radius: 50px; border: 2px solid; margin: 8px 0; transition: all 0.4s; }

.controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 16px 20px 14px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
.tab { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 0.82rem; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
.tab.active { background: var(--teal); border-color: var(--teal); color: #0b0e1a; }
.tab:hover:not(.active) { border-color: var(--teal); color: var(--teal); }
.search-wrap { position: relative; width: 100%; max-width: 320px; }
.search { width: 100%; padding: 8px 14px 8px 36px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--text); font-size: 0.85rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.2s; }
.search:focus { border-color: var(--teal); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }
.btn-reset { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--red); background: transparent; color: var(--red); cursor: pointer; font-size: 0.8rem; font-family: 'DM Sans', sans-serif; font-weight: 600; transition: all 0.2s; }
.btn-reset:hover { background: var(--red); color: white; }

.main { padding: 20px; max-width: 1200px; margin: 0 auto; }
.section-header { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--teal); border-left: 4px solid var(--teal); padding-left: 10px; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; }
.section-count { font-size: 0.72rem; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }

.fill-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; transition: all 0.25s; }
.fill-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: var(--shadow); }
.fill-card.correct { border-color: var(--green); background: #1c2d24; }
.fill-card.incorrect { border-color: var(--red); background: #2d1c1c; }
.fill-card.skipped { border-color: var(--blue); opacity: 0.75; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.q-text { font-weight: 500; font-size: 0.9rem; color: var(--text); flex: 1; line-height: 1.5; }
.freq { background: var(--tag); color: var(--teal); font-size: 0.68rem; font-weight: 700; padding: 3px 8px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; border: 1px solid #38d9c020; }
.ans-input { width: 100%; padding: 8px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.88rem; font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.2s; }
.ans-input:focus { border-color: var(--teal); }
.btn-check { margin-top: 8px; padding: 7px 16px; border-radius: 8px; border: none; background: var(--teal); color: #0b0e1a; font-size: 0.8rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.btn-check:hover { background: #2fc4ad; }
.btn-skip { margin-top: 8px; margin-left: 6px; padding: 7px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.btn-skip:hover { border-color: var(--blue); color: var(--blue); }
.result-ans.ok { color: var(--green); font-size: 0.88rem; font-weight: 600; }
.result-ans.bad { color: var(--red); font-size: 0.88rem; font-weight: 600; }
.correct-ans { font-size: 0.82rem; color: var(--teal); margin-top: 4px; }
.mnemonic { font-size: 0.78rem; color: var(--muted); font-style: italic; background: #1e2640; border-radius: 6px; padding: 6px 10px; border-left: 3px solid var(--teal); margin-top: 6px; line-height: 1.5; }

.tf-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; transition: all 0.25s; }
.tf-card:hover { border-color: var(--teal); box-shadow: var(--shadow); }
.tf-card.correct { border-color: var(--green); background: #1c2d24; }
.tf-card.incorrect { border-color: var(--red); background: #2d1c1c; }
.tf-q { font-size: 0.9rem; font-weight: 500; margin-bottom: 10px; line-height: 1.5; }
.tf-buttons { display: flex; gap: 8px; margin-bottom: 6px; }
.tf-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.tf-btn.true-btn:hover { border-color: var(--green); color: var(--green); }
.tf-btn.false-btn:hover { border-color: var(--red); color: var(--red); }
.tf-btn.selected-true { background: #1a3d2b; border-color: var(--green); color: var(--green); }
.tf-btn.selected-false { background: #3d1a1a; border-color: var(--red); color: var(--red); }
.tf-btn:disabled { cursor: not-allowed; opacity: 0.6; }
.tf-result { font-size: 0.82rem; margin-top: 6px; }
.tf-tip { font-size: 0.78rem; color: var(--muted); font-style: italic; margin-top: 5px; background: #1e2640; border-radius: 6px; padding: 5px 9px; border-left: 3px solid var(--teal); line-height: 1.4; }
.tf-freq { font-size: 0.68rem; color: var(--teal); font-weight: 700; margin-top: 5px; }

.def-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px; transition: all 0.25s; }
.def-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: var(--shadow); }
.def-term { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--teal); margin-bottom: 6px; }
.def-text { font-size: 0.85rem; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
.def-mem { font-size: 0.78rem; color: var(--muted); font-style: italic; background: #1e2640; border-radius: 6px; padding: 6px 10px; border-left: 3px solid var(--teal); line-height: 1.5; }
.def-freq { font-size: 0.68rem; color: var(--teal); font-weight: 700; margin-top: 6px; }

.progress-bar-wrap { background: var(--bg); border-radius: 8px; height: 12px; overflow: hidden; margin: 12px auto; max-width: 400px; }
.progress-bar { height: 100%; border-radius: 8px; transition: width 1s ease; background: linear-gradient(90deg, var(--teal), var(--green)); }
.count-line { text-align: center; color: var(--muted); font-size: 0.8rem; margin-bottom: 10px; }
.no-results { text-align: center; color: var(--muted); padding: 50px; font-size: 1rem; }

@media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 1.5rem; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.fill-card, .tf-card, .def-card { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>

<div class="hero">
  <h1>🏥 Community Health Nursing</h1>
  <p>CHN · Repeated Exam Questions · Self-Evaluation Study Guide</p>
  <div class="scoreboard">
    <div class="score-box"><div class="score-val gold" id="sc-total">0</div><div class="score-label">Attempted</div></div>
    <div class="score-box"><div class="score-val green" id="sc-correct">0</div><div class="score-label">Correct</div></div>
    <div class="score-box"><div class="score-val red" id="sc-wrong">0</div><div class="score-label">Wrong</div></div>
    <div class="score-box"><div class="score-val blue" id="sc-pct">—</div><div class="score-label">Score %</div></div>
    <div class="score-box"><div class="grade-badge" id="sc-grade" style="font-size:1.2rem;padding:6px 16px;color:#7a82a0;border-color:#7a82a0;">—</div><div class="score-label">Grade</div></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
</div>

<div class="controls">
  <button class="tab active" onclick="switchTab('fill')">📝 Fill in Blank</button>
  <button class="tab" onclick="switchTab('tf')">✅ True / False</button>
  <button class="tab" onclick="switchTab('meanings')">📖 Meanings</button>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search" type="text" id="searchBox" placeholder="Search topics, answers..." oninput="renderAll()">
  </div>
  <button class="btn-reset" onclick="resetAll()">↺ Reset All</button>
</div>

<div class="main">
  <p class="count-line" id="countLine"></p>
  <div id="content"></div>
</div>

<script>
const fillData = [
  // 1. Concept of Health, Disease & Epidemiology
  { section:"Concept of Health, Disease & Epidemiology", q:"Epidemiological triad involves Agent, Host and _______.", ans:"Environment", alts:["environmental"], mem:"Agent + Host + Environment = Epidemiological TRIAD. AHE = Always Have Evidence!", freq:"1× (May 2023)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"Typhoid is caused by _______.", ans:"Salmonella typhi", alts:["salmonella"], mem:"SALMOnella = contaminated SALMON/food. TYPHI = typhoid. Dirty water route!", freq:"1× (May 2023)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"Typhoid is a _______ born disease.", ans:"Water (or Water-borne)", alts:["water","waterborne","water borne"], mem:"TYPHOID = Tainted wYPHOID water! Always water-borne!", freq:"1× (Aug 2016)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"Malaria is caused by the bite of _______.", ans:"Female Anopheles mosquito", alts:["anopheles","female anopheles"], mem:"FEMALE Anopheles = Malaria. Only FEMALES bite and spread it!", freq:"3× (July/Aug 2024, Jan 2024, Aug 2012)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"Dengue fever is caused by the bite of _______.", ans:"Aedes aegypti mosquito", alts:["aedes aegypti","aedes"], mem:"AEDES = AIDS-like dengue. Aedes aegypti = Day-biting tiger mosquito!", freq:"1× (Feb 2019)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"The Causative organism of cholera is _______.", ans:"Vibrio cholerae", alts:["vibrio"], mem:"VIBRio = vibrating comma-shaped bacteria. Cholera = contaminated water!", freq:"1× (Aug 2015)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"Leprosy is caused by _______.", ans:"Mycobacterium leprae", alts:["mycobacterium leprae"], mem:"Myco = fungus-like. LEPrae = LEProsy. Same TB family!", freq:"1× (Jan 2022)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"_______ micro-organism causes Tuberculosis.", ans:"Mycobacterium tuberculosis", alts:["mycobacterium"], mem:"Myco-TUBERculosis = TB. Koch's bacillus — Robert KOCH discovered it!", freq:"1× (Feb 2017)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"A disease that is transmitted through contact is _______ disease.", ans:"Contagious (or Communicable)", alts:["contagious","communicable"], mem:"CONTAGIOUS = CONTACT. Touch it, catch it! Communicable = can communicate to others!", freq:"1× (Sep 2013)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"Hospital acquired infection is _______.", ans:"Nosocomial infection", alts:["nosocomial"], mem:"NOSOcomial = hospital acquired. NOSO = disease in Greek. Sick IN the hospital!", freq:"1× (Feb 2019)" },
  { section:"Concept of Health, Disease & Epidemiology", q:"The infection originating in a patient while in a hospital is called _______.", ans:"Nosocomial infection", alts:["nosocomial"], mem:"Originating IN hospital = NOSOcomial. Hospital = home of nosocomial bugs!", freq:"1× (June 2013)" },

  // 2. Community Health Nursing & Administration
  { section:"Community Health Nursing & Administration", q:"The Backbone of Public Health Nursing is _______.", ans:"Home visiting", alts:["home visit"], mem:"HOME visiting = BACKBONE of PHN. The nurse goes to YOUR home = backbone!", freq:"1× (July/Aug 2024)" },
  { section:"Community Health Nursing & Administration", q:"Community participation is one of the principles of _______.", ans:"Primary Health Care", alts:["primary health care","phc"], mem:"PRIMARY Health Care = people participate. PHC = People's Health Choice!", freq:"1× (Nov 2022)" },
  { section:"Community Health Nursing & Administration", q:"A sub centre covers a population of _______.", ans:"3000 to 5000", alts:["3000-5000","3000 to 5000"], mem:"Sub-centre = 3000-5000 people. Small sub = smaller population! 3-5 thousand.", freq:"1× (Aug 2011)" },
  { section:"Community Health Nursing & Administration", q:"A PHC caters to a population of _______.", ans:"20,000 to 30,000", alts:["20000-30000","20000 to 30000","20,000-30,000"], mem:"PHC = 20,000-30,000 people. 10 sub-centres × 3000 = PHC level!", freq:"1× (June 2013)" },
  { section:"Community Health Nursing & Administration", q:"The first referral unit for Primary Health Centre is _______.", ans:"Community Health Centre (CHC)", alts:["chc","community health centre"], mem:"PHC → CHC for referral. COMMUNITY Health Centre = first step up from PHC!", freq:"2× (Feb 2019, Feb 2011)" },
  { section:"Community Health Nursing & Administration", q:"Universal symbol of nursing is _______.", ans:"the White Heart", alts:["white heart"], mem:"WHITE HEART = nursing symbol. Pure, caring, universal! White = clean, Heart = care.", freq:"1× (Aug 2011)" },
  { section:"Community Health Nursing & Administration", q:"The Scientific study of human population is _______.", ans:"Demography", alts:[], mem:"DEMO = people, GRAPHY = study. Demography = study of people/population!", freq:"1× (Sep 2013)" },

  // 3. MCH & Immunization
  { section:"Maternal & Child Health & Immunization", q:"Under five clinic is also known/called as _______.", ans:"Well baby clinic", alts:["well baby"], mem:"Under-5 = WELL BABY clinic. Keeping babies WELL before 5 years!", freq:"4× (Jan 2024, Jan 2022, Feb 2019, Sep 2013)" },
  { section:"Maternal & Child Health & Immunization", q:"Normal weight of Indian new born baby is _______.", ans:"2.5 to 3.0 kg", alts:["2.5-3","2.5 to 3","2.5kg","2.5-3.0"], mem:"Indian newborn = 2.5-3 kg. About the weight of a bag of sugar!", freq:"2× (July 2025, Jan 2024)" },
  { section:"Maternal & Child Health & Immunization", q:"BCG vaccine is given to prevent _______.", ans:"Tuberculosis", alts:["tb"], mem:"BCG = Bacille Calmette-Guérin. B-C-G = Blocks Chest/TB Germs!", freq:"1× (July 2025)" },
  { section:"Maternal & Child Health & Immunization", q:"Dosage of BCG vaccine is _______.", ans:"0.05 ml (for new born)", alts:["0.05","0.05ml"], mem:"BCG = 0.05 ml. Tiny baby = TINY 0.05 dose!", freq:"1× (Feb 2011)" },
  { section:"Maternal & Child Health & Immunization", q:"The route of administration of BCG vaccine is _______.", ans:"Intradermal", alts:[], mem:"BCG = INTRAdermal. INTRA = within skin. The skin itself, not under it!", freq:"1× (June 2013)" },
  { section:"Maternal & Child Health & Immunization", q:"Most heat sensitive vaccine is _______.", ans:"OPV (Oral Polio Vaccine)", alts:["opv","oral polio vaccine","polio"], mem:"OPV = Oral Polio = most heat sensitive. 'Oh! Polio Vanishes in heat!' Keep COLD!", freq:"1× (Feb 2011)" },
  { section:"Maternal & Child Health & Immunization", q:"Measles vaccine protects against _______.", ans:"Measles", alts:[], mem:"Measles vaccine = Measles protection. Simple! Given at 9 months.", freq:"1× (July/Aug 2024)" },
  { section:"Maternal & Child Health & Immunization", q:"IUD's are the _______ method of family planning in Females.", ans:"Temporary (or Spacing)", alts:["temporary","spacing"], mem:"IUD = Temporary. IUD can be removed = temporary! Not permanent like tubectomy.", freq:"1× (May 2023)" },
  { section:"Maternal & Child Health & Immunization", q:"'I pill' is an example of _______.", ans:"Emergency Contraceptive", alts:["emergency contraceptive","emergency"], mem:"I-pill = Emergency use after unprotected sex. EMERGENCY = last resort!", freq:"1× (Aug 2011)" },

  // 4. Nutrition
  { section:"Nutrition", q:"Deficiency of _______ in diets leads to Goiter.", ans:"Iodine", alts:[], mem:"IODINE deficiency = goIter. IO-dine = I-Owe my thyroid iodine! No iodine = big neck!", freq:"5× (Jan 2024, Feb 2019, Aug 2018, Aug 2016, Aug 2015)" },
  { section:"Nutrition", q:"The natural/main Source of Vitamin D is _______.", ans:"Sunlight", alts:["sun"], mem:"Vitamin D = Sunlight = D for Daylight! Stand in the SUN = free Vitamin D!", freq:"2× (July/Aug 2024, Feb 2019)" },
  { section:"Nutrition", q:"Rickets is the deficiency disease of _______.", ans:"Vitamin D", alts:[], mem:"RICKETS = soft/bent bones. RICKety = lacking Vitamin D + Calcium!", freq:"1× (Feb 2016)" },
  { section:"Nutrition", q:"Vitamin A deficiency leads to _______.", ans:"Night blindness", alts:["night blind"], mem:"Vitamin A = vIsion in night. No A = No night-sIght = Night blindness!", freq:"1× (May 2023)" },
  { section:"Nutrition", q:"Deficiency of Vitamin C causes _______.", ans:"Scurvy", alts:[], mem:"C = Citrus prevents sCurvy. Old sailors = no citrus = scurvy gums!", freq:"1× (Nov 2022)" },
  { section:"Nutrition", q:"Deficiency of Thiamine causes _______.", ans:"Beriberi", alts:[], mem:"THIAMINE deficiency = BERIBERI. 'I BERI BERI sick without Thiamine (B1)!'", freq:"1× (Aug 2014)" },
  { section:"Nutrition", q:"Niacin deficiency results in _______.", ans:"Pellagra", alts:[], mem:"NIACIN (B3) = PELLAGRA. 3 Ds of Pellagra: Dermatitis, Diarrhoea, Dementia!", freq:"1× (Feb 2011)" },
  { section:"Nutrition", q:"Deficiency of Iron causes/leads to _______.", ans:"Anemia", alts:["anaemia"], mem:"IRON deficiency = ANEMIA. No iron = no haemoglobin = pale and tired!", freq:"2× (Feb 2017, Feb 2016)" },
  { section:"Nutrition", q:"Koilonychia means _______.", ans:"Spoon shaped nails", alts:["spoon shaped","spoon nails"], mem:"KOILonychia = KOIL = hollow/spoon in Greek. Spoon nails = iron deficiency sign!", freq:"1× (Aug 2012)" },
  { section:"Nutrition", q:"Protein requirement is _______ Body weight.", ans:"1 gm per kg", alts:["1g/kg","1gm/kg","1 gram per kg"], mem:"Protein = 1g per kg. Easy! 60kg person = 60g protein daily!", freq:"1× (Aug 2012)" },
  { section:"Nutrition", q:"_______ are the building blocks of proteins.", ans:"Amino acids", alts:["amino acid"], mem:"AMINO ACIDS = protein building blocks. Like LEGO bricks that build the protein structure!", freq:"1× (Feb 2017)" },
  { section:"Nutrition", q:"Essential amino acids are _______ in number which cannot be synthesized in the body.", ans:"9", alts:["nine"], mem:"9 essential amino acids = body can't make them. 'NINE that you MUST Dine on!'", freq:"1× (Aug 2012)" },

  // 5. Environmental Hygiene
  { section:"Environmental Hygiene", q:"Contact period of Chlorination of water is _______.", ans:"60 minutes (1 hour)", alts:["60 minutes","1 hour","60 mins"], mem:"Chlorination contact = 60 minutes. 1 HOUR for chlorine to kill all germs!", freq:"2× (July 2025, Aug 2012)" },
  { section:"Environmental Hygiene", q:"Wells are disinfected by _______.", ans:"Bleaching powder", alts:["bleach"], mem:"WELLS + BLEACHING powder = clean water. Bleach the well to kill the germs!", freq:"1× (Aug 2014)" },
  { section:"Environmental Hygiene", q:"The water testing apparatus is _______.", ans:"Horrock's Apparatus", alts:["horrocks"], mem:"HORROCK'S = water testing. 'HORROCKs tests water — HORRIBLE water = needs testing!'", freq:"1× (Feb 2016)" },
  { section:"Environmental Hygiene", q:"The best method of disposal of hospital waste is _______.", ans:"Incineration", alts:[], mem:"Hospital waste = INCINERATION. INCINERATE = burn completely. Safest for biohazard!", freq:"1× (Nov 2022)" },
  { section:"Environmental Hygiene", q:"Disposal of waste by burning is called as _______.", ans:"Incineration", alts:[], mem:"Burning = INCINERATION. INCINER = to reduce to ashes by fire!", freq:"1× (Aug 2018)" },
  { section:"Environmental Hygiene", q:"Sullage means waste water which does not contain _______.", ans:"Human excreta", alts:["human excreta","excreta"], mem:"SULLAGE = grey water (kitchen/bath). SULLage = SULLIED but no faecal matter!", freq:"1× (Feb 2011)" },
  { section:"Environmental Hygiene", q:"Exchange of air between indoor and outdoor is called as _______.", ans:"Ventilation", alts:[], mem:"VENTILATION = VENTing air. Open the VENT = indoor + outdoor air exchange!", freq:"1× (Aug 2018)" },
  { section:"Environmental Hygiene", q:"Deafness is caused by _______ pollution.", ans:"Noise", alts:[], mem:"NOISE = Deafness. Too much NOISE = no more hearing! Noise pollution damages ears.", freq:"1× (Aug 2016)" },
  { section:"Environmental Hygiene", q:"Loudness of noise is measured in _______.", ans:"Decibels (dB)", alts:["decibels","db"], mem:"DECIBELS (dB) = loudness unit. DECIbel = DECI sound measurement. Loud = high dB!", freq:"1× (Feb 2011)" },

// STATE

let currentTab = 'fill';
const fillState = {};
const tfState = {};

function getScore() {
  let c=0,w=0,t=0;
  Object.values(fillState).forEach(s=>{t++;if(s.status==='correct')c++;else if(s.status==='incorrect')w++;});
  Object.values(tfState).forEach(s=>{t++;if(s.status==='correct')c++;else if(s.status==='incorrect')w++;});
  return {correct:c,wrong:w,total:t};
}

function getGrade(p) {
  if(p>=90)return{g:'A+',c:'#4ddd80'};
  if(p>=80)return{g:'A',c:'#4ddd80'};
  if(p>=70)return{g:'B',c:'#f5c842'};
  if(p>=60)return{g:'C',c:'#f5a623'};
  if(p>=50)return{g:'D',c:'#ff9f43'};
  return{g:'F',c:'#ff6b6b'};
}

function updateScore() {
  const {correct,wrong,total} = getScore();
  document.getElementById('sc-total').textContent = total;
  document.getElementById('sc-correct').textContent = correct;
  document.getElementById('sc-wrong').textContent = wrong;
  const p = total > 0 ? Math.round(correct/total*100) : null;
  document.getElementById('sc-pct').textContent = p !== null ? p+'%' : '—';
  document.getElementById('progress-bar').style.width = (p||0)+'%';
  const gb = document.getElementById('sc-grade');
  if(p !== null) {
    const {g,c} = getGrade(p);
    gb.textContent = g; gb.style.color = c; gb.style.borderColor = c;
  } else {
    gb.textContent = '—'; gb.style.color = '#7a82a0'; gb.style.borderColor = '#7a82a0';
  }
}

function resetAll() {
  if(!confirm('Reset all answers?')) return;
  Object.keys(fillState).forEach(k => delete fillState[k]);
  Object.keys(tfState).forEach(k => delete tfState[k]);
  updateScore(); renderAll();
}

function checkFill(id) {
  const inp = document.getElementById('input-'+id);
  if(!inp) return;
  const u = inp.value.trim();
  if(!u) return;
  const item = fillData[parseInt(id)];
  if(!item) return;
  const n = s => s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const nu = n(u);
  const allAns = [n(item.ans), ...(item.alts||[]).map(n)];
  const ok = allAns.some(a => nu.includes(a) || a.includes(nu));
  fillState[id] = {status: ok ? 'correct' : 'incorrect', userAns: u};
  updateScore();
  refreshFill(id);
}

function skipFill(id) {
  fillState[id] = {status:'skipped'};
  updateScore();
  refreshFill(id);
}

function refreshFill(id) {
  const card = document.getElementById('fcard-'+id);
  if(!card) return;
  const s = fillState[id];
  const item = fillData[parseInt(id)];
  if(!item) return;
  card.classList.remove('correct','incorrect','skipped');
  if(s) card.classList.add(s.status);
  const aa = card.querySelector('.answer-area');
  if(!aa || !s) return;
  let h = '';
  if(s.status === 'correct') {
    h = `<div class="result-ans ok">✅ Correct! "${s.userAns}"</div><div class="mnemonic">💡 ${item.mem}</div>`;
  } else if(s.status === 'incorrect') {
    h = `<div class="result-ans bad">❌ Your answer: "${s.userAns}"</div><div class="correct-ans">✅ Correct Answer: <strong>${item.ans}</strong></div><div class="mnemonic">💡 ${item.mem}</div>`;
  } else {
    h = `<div class="correct-ans">⏭ Skipped — Answer: <strong>${item.ans}</strong></div><div class="mnemonic">💡 ${item.mem}</div>`;
  }
  aa.innerHTML = h;
}

function checkTF(id, chosen) {
  const item = tfData[parseInt(id)];
  if(!item) return;
  tfState[id] = {status: (chosen === item.ans) ? 'correct' : 'incorrect', chosen};
  updateScore();
  refreshTF(id);
}

function refreshTF(id) {
  const card = document.getElementById('tfcard-'+id);
  if(!card) return;
  const s = tfState[id];
  const item = tfData[parseInt(id)];
  card.classList.remove('correct','incorrect');
  if(s) {
    card.classList.add(s.status);
    const tb = card.querySelector('.true-btn');
    const fb = card.querySelector('.false-btn');
    if(tb){tb.disabled=true; tb.classList.toggle('selected-true', s.chosen===true);}
    if(fb){fb.disabled=true; fb.classList.toggle('selected-false', s.chosen===false);}
    const rd = card.querySelector('.tf-result');
    if(rd) rd.innerHTML = s.status==='correct'
      ? `<span style="color:var(--green)">✅ Correct!</span>`
      : `<span style="color:var(--red)">❌ Wrong — Correct Answer: <strong style="color:var(--green)">${item.ans?'TRUE ✓':'FALSE ✗'}</strong></span>`;
    const td = card.querySelector('.tf-tip');
    if(td) td.style.display = 'block';
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['fill','tf','meanings'][i] === tab));
  renderAll();
}

function getQ() { return document.getElementById('searchBox').value.toLowerCase().trim(); }

function renderAll() {
  const q = getQ();
  const c = document.getElementById('content');
  c.innerHTML = '';
  if(currentTab==='fill') renderFill(q,c);
  else if(currentTab==='tf') renderTF(q,c);
  else renderMeanings(q,c);
}

function renderFill(q, container) {
  const secs = {}; let t = 0;
  fillData.forEach((item,i) => {
    if(q && ![item.q,item.ans,item.section,item.mem].some(s=>s.toLowerCase().includes(q))) return;
    if(!secs[item.section]) secs[item.section]=[];
    secs[item.section].push({item,i}); t++;
  });
  document.getElementById('countLine').textContent = `Showing ${t} questions`;
  if(!t){container.innerHTML='<p class="no-results">No results found.</p>';return;}
  Object.entries(secs).forEach(([sec,entries]) => {
    container.insertAdjacentHTML('beforeend',`<div class="section-header">${sec} <span class="section-count">${entries.length} questions</span></div>`);
    const g = document.createElement('div'); g.className='grid';
    entries.forEach(({item,i}) => {
      const s = fillState[i];
      const card = document.createElement('div');
      card.className = `fill-card ${s?s.status:''}`;
      card.id = 'fcard-'+i;
      let aa = '';
      if(s) {
        if(s.status==='correct') {
          aa = `<div class="result-ans ok">✅ Correct! "${s.userAns}"</div><div class="mnemonic">💡 ${item.mem}</div>`;
        } else if(s.status==='incorrect') {
          aa = `<div class="result-ans bad">❌ Your answer: "${s.userAns}"</div><div class="correct-ans">✅ Correct Answer: <strong>${item.ans}</strong></div><div class="mnemonic">💡 ${item.mem}</div>`;
        } else {
          aa = `<div class="correct-ans">⏭ Skipped — Answer: <strong>${item.ans}</strong></div><div class="mnemonic">💡 ${item.mem}</div>`;
        }
      } else {
        aa = `<input class="ans-input" id="input-${i}" type="text" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkFill(${i})">
        <div class="btn-row"><button class="btn-check" onclick="checkFill(${i})">Check ✓</button><button class="btn-skip" onclick="skipFill(${i})">Skip</button></div>`;
      }
      card.innerHTML = `<div class="card-top"><div class="q-text">${item.q}</div><div class="freq">🔁 ${item.freq}</div></div><div class="answer-area">${aa}</div>`;
      g.appendChild(card);
    });
    container.appendChild(g);
  });
}

function renderTF(q, container) {
  const secs = {}; let t = 0;
  tfData.forEach((item,i) => {
    if(q && ![item.q,item.tip,item.section].some(s=>s.toLowerCase().includes(q))) return;
    if(!secs[item.section]) secs[item.section]=[];
    secs[item.section].push({item,i}); t++;
  });
  document.getElementById('countLine').textContent = `Showing ${t} statements`;
  if(!t){container.innerHTML='<p class="no-results">No results found.</p>';return;}
  Object.entries(secs).forEach(([sec,entries]) => {
    container.insertAdjacentHTML('beforeend',`<div class="section-header">${sec} <span class="section-count">${entries.length} statements</span></div>`);
    const g = document.createElement('div'); g.className='grid';
    entries.forEach(({item,i}) => {
      const s = tfState[i];
      const card = document.createElement('div');
      card.className = `tf-card ${s?s.status:''}`;
      card.id = 'tfcard-'+i;
      const rh = s ? (s.status==='correct'
        ? `<span style="color:var(--green)">✅ Correct!</span>`
        : `<span style="color:var(--red)">❌ Wrong — Correct Answer: <strong style="color:var(--green)">${item.ans?'TRUE ✓':'FALSE ✗'}</strong></span>`) : '';
      card.innerHTML = `<div class="tf-q">${item.q}</div>
        <div class="tf-buttons">
          <button class="tf-btn true-btn ${s&&s.chosen===true?'selected-true':''}" onclick="checkTF(${i},true)" ${s?'disabled':''}>✓ TRUE</button>
          <button class="tf-btn false-btn ${s&&s.chosen===false?'selected-false':''}" onclick="checkTF(${i},false)" ${s?'disabled':''}>✗ FALSE</button>
        </div>
        <div class="tf-result">${rh}</div>
        <div class="tf-tip" style="display:${s?'block':'none'}">💡 ${item.tip}</div>
        <div class="tf-freq">🔁 ${item.freq}</div>`;
      g.appendChild(card);
    });
    container.appendChild(g);
  });
}

function renderMeanings(q, container) {
  const secs = {}; let t = 0;
  meaningsData.forEach((item,i) => {
    if(q && ![item.term,item.def,item.section,item.mem].some(s=>s.toLowerCase().includes(q))) return;
    if(!secs[item.section]) secs[item.section]=[];
    secs[item.section].push({item,i}); t++;
  });
  document.getElementById('countLine').textContent = `Showing ${t} definitions`;
  if(!t){container.innerHTML='<p class="no-results">No results found.</p>';return;}
  Object.entries(secs).forEach(([sec,entries]) => {
    container.insertAdjacentHTML('beforeend',`<div class="section-header">${sec} <span class="section-count">${entries.length} terms</span></div>`);
    const g = document.createElement('div'); g.className='grid';
    entries.forEach(({item}) => {
      const card = document.createElement('div'); card.className='def-card';
      card.innerHTML = `<div class="def-term">${item.term}</div><div class="def-text">${item.def}</div><div class="def-mem">💡 ${item.mem}</div><div class="def-freq">🔁 ${item.freq}</div>`;
      g.appendChild(card);
    });
    container.appendChild(g);
  });
}

updateScore();
renderAll();

</script>
</body>
</html>
